<!doctype html>
<html lang="es">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <meta charset="UTF-8" />
    <title>Simon Kawaii ✨</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Nunito", sans-serif;
        background: linear-gradient(135deg, #ffe6f2 0%, #e6f7ff 100%);
        margin: 0;
        padding: 20px;
        text-align: center;
      }

      .kawaii-box {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 40px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(255, 153, 204, 0.3);
        max-width: 500px;
        margin: 0 auto;
        border: 4px dashed #ffb3d9;
        backdrop-filter: blur(5px);
      }

      h1 {
        color: #ff3385;
        font-size: 2.5em;
        margin-top: 0;
        text-shadow: 2px 2px #fff;
      }

      .hud {
        font-size: 2em;
        color: #ff3385;
        font-weight: 900;
        margin-bottom: 20px;
      }

      .tablero {
        display: grid;
        grid-template-columns: 140px 140px;
        gap: 20px;
        justify-content: center;
        margin-bottom: 20px;
      }

      .btn-color {
        width: 140px;
        height: 140px;
        border-radius: 40px;
        border: 4px solid rgba(255, 255, 255, 0.5);
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 8px 0 rgba(0, 0, 0, 0.1);
      }
      /* Colores vibrantes y brillantes */

      .pink {
        background: linear-gradient(135deg, #ff99cc, #ff66a3);
      }

      .blue {
        background: linear-gradient(135deg, #99ccff, #66b3ff);
      }

      .yellow {
        background: linear-gradient(135deg, #ffff99, #ffcc33);
      }

      .green {
        background: linear-gradient(135deg, #99ff99, #33cc66);
      }
      /* Efecto de brillo al iluminarse */

      .iluminar {
        transform: scale(0.95);
        filter: brightness(1.5);
        box-shadow: 0 0 30px white;
      }

      .btn-accion {
        background: #ff3385;
        color: white;
        border: none;
        padding: 15px 40px;
        border-radius: 50px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1.2em;
        box-shadow: 0 5px 15px rgba(255, 51, 133, 0.4);
      }
    </style>
  </head>

  <body>
    <div class="kawaii-box">
      <h1>✨ Simon Kawaii ✨</h1>
      <div class="hud">Nivel: <span id="nivel">0</span></div>

      <div class="tablero">
        <button class="btn-color pink" onclick="clickColor(0)"></button>
        <button class="btn-color blue" onclick="clickColor(1)"></button>
        <button class="btn-color yellow" onclick="clickColor(2)"></button>
        <button class="btn-color green" onclick="clickColor(3)"></button>
      </div>

      <button class="btn-accion" onclick="iniciar()">▶️ Iniciar</button>
      <a
        href="/secreto"
        class="btn-accion"
        style="background: #fff; color: #ff3385; border: 2px solid #ff3385"
        >🏠 Menú</a
      >
    </div>

    <script>
      let secuencia = [];
      let usuarioSecuencia = [];
      let nivel = 0;
      let puedeJugar = false;
      const botones = document.querySelectorAll(".btn-color");

      function iniciar() {
        secuencia = [];
        nivel = 0;
        siguienteNivel();
      }

      function siguienteNivel() {
        puedeJugar = false;
        usuarioSecuencia = [];
        nivel++;
        document.getElementById("nivel").innerText = nivel;
        secuencia.push(Math.floor(Math.random() * 4));
        mostrarSecuencia();
      }

      async function mostrarSecuencia() {
        for (let color of secuencia) {
          await new Promise((r) => setTimeout(r, 800));
          iluminar(color);
        }
        puedeJugar = true;
      }

      function iluminar(i) {
        botones[i].classList.add("iluminar");
        setTimeout(() => botones[i].classList.remove("iluminar"), 400);
      }

      function clickColor(i) {
        if (!puedeJugar) return;
        iluminar(i);
        usuarioSecuencia.push(i);

        if (
          usuarioSecuencia[usuarioSecuencia.length - 1] !==
          secuencia[usuarioSecuencia.length - 1]
        ) {
          alert("¡Te equivocaste! 🐾 Llegaste al nivel " + nivel);
          guardar();
        } else if (usuarioSecuencia.length === secuencia.length) {
          puedeJugar = false;
          setTimeout(siguienteNivel, 1000);
        }
      }

      function guardar() {
        let n = prompt("¡Buen intento! Ingresa tu nombre:");
        if (n) {
          fetch("/guardar_simon", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              nombre: n,
              puntos: nivel,
            }),
          }).then(() => (location.href = "/secreto"));
        }
      }
    </script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    <script>
      // Ejemplo de cómo usarlo en cualquier juego:
      // Ya no necesitas prompt, el archivo scripts.js se encarga de todo.

      function alGanarJuego(misPuntos) {
        // Solo llamas a esta función y listo
        enviarPuntaje("/guardar_tu_juego", { puntos: misPuntos });
      }
    </script>
  </body>
</html>
