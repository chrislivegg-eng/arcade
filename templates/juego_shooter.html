<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>🚀 Kitty Space Defender - Edición Galáctica</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Nunito", sans-serif;
        background: linear-gradient(135deg, #0a001a, #1a0033, #0d0020);
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow: hidden;
      }

      /* Partículas de fondo */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          radial-gradient(2px 2px at 20px 30px, #eee, transparent),
          radial-gradient(2px 2px at 40px 70px, #fff, transparent),
          radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
          radial-gradient(2px 2px at 90px 40px, #fff, transparent),
          radial-gradient(2px 2px at 130px 80px, #eee, transparent),
          radial-gradient(2px 2px at 160px 30px, #ddd, transparent);
        background-size: 200px 200px;
        opacity: 0.3;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        background: rgba(26, 0, 51, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 40px;
        padding: 30px 25px;
        border: 3px solid rgba(204, 51, 255, 0.3);
        box-shadow: 0 20px 60px rgba(204, 51, 255, 0.2);
        max-width: 600px;
        width: 100%;
        text-align: center;
      }

      h1 {
        font-size: 2.2rem;
        background: linear-gradient(135deg, #ff66cc, #cc33ff, #9966ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: none;
        margin-bottom: 5px;
      }

      .subtitle {
        color: #cc99ff;
        font-size: 0.9rem;
        margin-bottom: 15px;
        opacity: 0.8;
      }

      /* HUD */
      .hud-container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 15px;
      }

      .hud-item {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 15px;
        padding: 8px 5px;
        border: 1px solid rgba(204, 51, 255, 0.2);
      }

      .hud-item .label {
        font-size: 0.6rem;
        color: #9966cc;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .hud-item .value {
        font-size: 1.5rem;
        font-weight: 900;
        background: linear-gradient(135deg, #ff66cc, #cc33ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hud-item .value.health {
        -webkit-text-fill-color: #ff6b6b;
      }

      /* Canvas */
      .canvas-wrapper {
        position: relative;
        border-radius: 20px;
        overflow: hidden;
        border: 3px solid rgba(204, 51, 255, 0.3);
        box-shadow: inset 0 0 50px rgba(204, 51, 255, 0.1);
        margin-bottom: 15px;
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
        background: radial-gradient(ellipse at center, #1a0033, #0a001a);
        cursor: none;
        touch-action: none;
      }

      /* Controles móviles */
      .controles-movil {
        display: none;
        gap: 15px;
        justify-content: center;
        margin: 10px 0;
      }

      .btn-control {
        background: rgba(204, 51, 255, 0.2);
        border: 2px solid rgba(204, 51, 255, 0.3);
        border-radius: 20px;
        padding: 15px 30px;
        font-size: 2rem;
        color: white;
        cursor: pointer;
        transition: all 0.2s ease;
        user-select: none;
        touch-action: none;
        min-width: 80px;
      }

      .btn-control:active {
        background: rgba(204, 51, 255, 0.4);
        transform: scale(0.95);
      }

      .btn-control.fire {
        background: rgba(255, 51, 133, 0.3);
        border-color: rgba(255, 51, 133, 0.5);
      }

      .btn-control.fire:active {
        background: rgba(255, 51, 133, 0.5);
      }

      /* Botones */
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin: 10px 0;
      }

      .btn {
        padding: 12px 30px;
        border: none;
        border-radius: 30px;
        font-family: "Nunito", sans-serif;
        font-weight: 900;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #ff66cc, #cc33ff);
        color: white;
        box-shadow: 0 6px 20px rgba(204, 51, 255, 0.4);
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(204, 51, 255, 0.5);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        color: #cc99ff;
        border: 2px solid rgba(204, 51, 255, 0.3);
      }

      .btn-secondary:hover {
        background: rgba(204, 51, 255, 0.2);
        transform: translateY(-3px);
      }

      .btn-gold {
        background: linear-gradient(135deg, #ffd700, #ffaa00);
        color: #1a0033;
        box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
      }

      .btn-gold:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
      }

      /* Récords */
      .records-section {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 2px dashed rgba(204, 51, 255, 0.2);
      }

      .records-section h3 {
        color: #cc99ff;
        font-size: 0.9rem;
        margin-bottom: 10px;
      }

      .records-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 5px;
      }

      .record-item {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 5px 10px;
        font-size: 0.75rem;
        border: 1px solid rgba(204, 51, 255, 0.15);
        display: flex;
        justify-content: space-between;
      }

      .record-item .name {
        color: #cc99ff;
      }

      .record-item .score {
        color: #ff66cc;
        font-weight: 900;
      }

      .back-link {
        display: inline-block;
        margin-top: 10px;
        color: #9966cc;
        font-weight: 900;
        text-decoration: none;
        padding: 8px 20px;
        border-radius: 30px;
        border: 2px solid rgba(204, 51, 255, 0.2);
        transition: all 0.3s ease;
        font-size: 0.9rem;
      }

      .back-link:hover {
        background: rgba(204, 51, 255, 0.2);
        color: #cc99ff;
      }

      /* Responsive */
      @media (max-width: 500px) {
        .container {
          padding: 15px 12px;
        }

        h1 {
          font-size: 1.6rem;
        }

        .hud-container {
          grid-template-columns: repeat(4, 1fr);
          gap: 5px;
        }

        .hud-item .value {
          font-size: 1.2rem;
        }

        .controles-movil {
          display: flex;
        }

        .btn-control {
          padding: 12px 20px;
          font-size: 1.5rem;
          min-width: 60px;
        }
      }

      @media (pointer: coarse) {
        .controles-movil {
          display: flex;
        }
      }

      @media (pointer: fine) {
        .controles-movil {
          display: none !important;
        }
      }

      .game-over-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        border-radius: 20px;
        z-index: 10;
      }

      .game-over-overlay.show {
        display: flex;
      }

      .game-over-overlay .title {
        font-size: 2.5rem;
        font-weight: 900;
        color: #ff66cc;
        margin-bottom: 10px;
      }

      .game-over-overlay .sub {
        color: #cc99ff;
        font-size: 1.2rem;
        margin-bottom: 5px;
      }

      .game-over-overlay .final-score {
        font-size: 3rem;
        font-weight: 900;
        background: linear-gradient(135deg, #ffd700, #ffaa00);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 10px 0;
      }

      .game-over-overlay .stats {
        color: #9966cc;
        font-size: 0.9rem;
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🚀 Kitty Space Defender</h1>
      <p class="subtitle">
        ✨ Defiende la galaxia de los invasores alienígenas
      </p>

      <!-- HUD -->
      <div class="hud-container">
        <div class="hud-item">
          <div class="label">⭐ Puntos</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="hud-item">
          <div class="label">❤️ Vida</div>
          <div class="value health" id="health">❤️❤️❤️</div>
        </div>
        <div class="hud-item">
          <div class="label">🎯 Nivel</div>
          <div class="value" id="level">1</div>
        </div>
        <div class="hud-item">
          <div class="label">💥 Eliminados</div>
          <div class="value" id="kills">0</div>
        </div>
      </div>

      <!-- Canvas -->
      <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="500" height="600"></canvas>
        <div class="game-over-overlay" id="gameOverOverlay">
          <div class="title">💥 GAME OVER</div>
          <div class="sub">Puntuación Final</div>
          <div class="final-score" id="finalScore">0</div>
          <div class="stats" id="finalStats">Nivel: 1 | Eliminados: 0</div>
          <button class="btn btn-primary" onclick="reiniciarJuego()">
            🔄 Jugar de Nuevo
          </button>
        </div>
      </div>

      <!-- Controles móviles -->
      <div class="controles-movil">
        <button class="btn-control" id="btnLeft">⬅️</button>
        <button class="btn-control fire" id="btnFire">🔥</button>
        <button class="btn-control" id="btnRight">➡️</button>
      </div>

      <!-- Controles -->
      <div class="controls">
        <button class="btn btn-primary" onclick="iniciarJuego()" id="btnStart">
          🚀 Iniciar Misión
        </button>
        <button class="btn btn-secondary" onclick="resetGame()">
          🔄 Reiniciar
        </button>
      </div>

      <!-- Récords -->
      <div class="records-section">
        <h3>🏆 Mejores Puntuaciones</h3>
        <div class="records-grid" id="recordsGrid">
          <div class="record-item"><span class="name">Cargando...</span></div>
        </div>
      </div>

      <a href="/secreto" class="back-link">🏠 Volver al Menú</a>
    </div>

    <script>
      // ============================================================
      //  CONFIGURACIÓN DEL JUEGO
      // ============================================================
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      // Tamaños
      const SHIP_W = 45;
      const SHIP_H = 45;
      const ENEMY_SIZE = 40;
      const BULLET_SIZE = 8;

      // Estado del juego
      let gameActive = false;
      let score = 0;
      let health = 3;
      let level = 1;
      let kills = 0;
      let frameCount = 0;
      let ship = { x: 230, y: 520 };
      let bullets = [];
      let enemies = [];
      let stars = [];
      let particles = [];
      let powerups = [];
      let enemyBullets = [];
      let combo = 0;
      let maxCombo = 0;

      // Teclas
      const keys = {};

      // Elementos DOM
      const scoreDisp = document.getElementById("score");
      const healthDisp = document.getElementById("health");
      const levelDisp = document.getElementById("level");
      const killsDisp = document.getElementById("kills");
      const btnStart = document.getElementById("btnStart");
      const gameOverOverlay = document.getElementById("gameOverOverlay");
      const finalScore = document.getElementById("finalScore");
      const finalStats = document.getElementById("finalStats");
      const recordsGrid = document.getElementById("recordsGrid");

      // ============================================================
      //  ESTRELLAS DE FONDO
      // ============================================================
      function initStars() {
        stars = [];
        for (let i = 0; i < 80; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 1,
            speed: Math.random() * 2 + 0.5,
            brightness: Math.random() * 0.5 + 0.5,
          });
        }
      }

      function updateStars() {
        for (const star of stars) {
          star.y += star.speed;
          if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
          }
        }
      }

      function drawStars() {
        for (const star of stars) {
          ctx.globalAlpha = star.brightness;
          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // ============================================================
      //  PARTÍCULAS
      // ============================================================
      function createExplosion(x, y, color, count = 20) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 5 + 2;
          particles.push({
            x: x,
            y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: Math.random() * 30 + 20,
            maxLife: 50,
            size: Math.random() * 6 + 2,
            color: color || `hsl(${Math.random() * 60 + 300}, 100%, 70%)`,
          });
        }
      }

      function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.98;
          p.vy *= 0.98;
          p.life--;
          if (p.life <= 0) {
            particles.splice(i, 1);
          }
        }
      }

      function drawParticles() {
        for (const p of particles) {
          const alpha = p.life / p.maxLife;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // ============================================================
      //  INICIAR JUEGO
      // ============================================================
      function iniciarJuego() {
        if (gameActive) return;
        gameActive = true;
        score = 0;
        health = 3;
        level = 1;
        kills = 0;
        combo = 0;
        maxCombo = 0;
        ship.x = canvas.width / 2 - SHIP_W / 2;
        bullets = [];
        enemies = [];
        particles = [];
        powerups = [];
        enemyBullets = [];
        gameOverOverlay.classList.remove("show");
        btnStart.disabled = true;
        btnStart.textContent = "⏳ En juego...";
        initStars();
        actualizarHUD();
        gameLoop();
      }

      // ============================================================
      //  BUCLE PRINCIPAL
      // ============================================================
      let animationId = null;

      function gameLoop() {
        if (!gameActive) return;
        frameCount++;
        updateStars();
        updateParticles();
        updateShip();
        updateBullets();
        updateEnemies();
        updatePowerups();
        updateEnemyBullets();
        checkCollisions();
        spawnEnemies();
        draw();
        actualizarHUD();
        animationId = requestAnimationFrame(gameLoop);
      }

      // ============================================================
      //  ACTUALIZAR NAVE
      // ============================================================
      function updateShip() {
        // Teclado
        if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
          ship.x = Math.max(0, ship.x - 6);
        }
        if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
          ship.x = Math.min(canvas.width - SHIP_W, ship.x + 6);
        }
        if (keys[" "] || keys["Space"]) {
          disparar();
          keys[" "] = false;
          keys["Space"] = false;
        }
      }

      function disparar() {
        if (!gameActive) return;
        const cadencia = Math.max(8, 15 - level);
        if (frameCount % cadencia === 0) {
          bullets.push({
            x: ship.x + SHIP_W / 2 - BULLET_SIZE / 2,
            y: ship.y - 10,
            w: BULLET_SIZE,
            h: BULLET_SIZE * 2,
            damage: 1,
          });
          // Disparo doble a partir del nivel 3
          if (level >= 3) {
            bullets.push({
              x: ship.x + 5,
              y: ship.y - 5,
              w: BULLET_SIZE,
              h: BULLET_SIZE * 2,
              damage: 1,
            });
            bullets.push({
              x: ship.x + SHIP_W - BULLET_SIZE - 5,
              y: ship.y - 5,
              w: BULLET_SIZE,
              h: BULLET_SIZE * 2,
              damage: 1,
            });
          }
        }
      }

      // ============================================================
      //  ACTUALIZAR BALAS
      // ============================================================
      function updateBullets() {
        for (let i = bullets.length - 1; i >= 0; i--) {
          bullets[i].y -= 10;
          if (bullets[i].y < 0) {
            bullets.splice(i, 1);
          }
        }
      }

      // ============================================================
      //  ACTUALIZAR ENEMIGOS
      // ============================================================
      function updateEnemies() {
        const speed = 1.5 + level * 0.3;
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          e.y += speed;

          // Movimiento lateral
          if (e.type === "zigzag") {
            e.x += Math.sin(e.x + frameCount * 0.02) * 1.5;
          } else if (e.type === "fast") {
            e.y += 1;
          } else if (e.type === "tank") {
            e.y += 0.5;
          }

          // Disparo de enemigos (a partir del nivel 2)
          if (
            level >= 2 &&
            e.type !== "tank" &&
            Math.random() < 0.005 + level * 0.001
          ) {
            enemyBullets.push({
              x: e.x + ENEMY_SIZE / 2 - 4,
              y: e.y + ENEMY_SIZE,
              speed: 3 + level * 0.2,
            });
          }

          if (e.y > canvas.height + 50) {
            enemies.splice(i, 1);
          }
        }
      }

      // ============================================================
      //  ACTUALIZAR POWER-UPS
      // ============================================================
      function updatePowerups() {
        for (let i = powerups.length - 1; i >= 0; i--) {
          const p = powerups[i];
          p.y += 2;
          if (p.y > canvas.height) {
            powerups.splice(i, 1);
          }
        }
      }

      // ============================================================
      //  ACTUALIZAR BALAS ENEMIGAS
      // ============================================================
      function updateEnemyBullets() {
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const b = enemyBullets[i];
          b.y += b.speed;
          if (b.y > canvas.height) {
            enemyBullets.splice(i, 1);
          }
        }
      }

      // ============================================================
      //  GENERAR ENEMIGOS
      // ============================================================
      function spawnEnemies() {
        const spawnRate = Math.max(0.01, 0.04 - level * 0.003);
        if (Math.random() < spawnRate) {
          const tipos = ["normal", "normal", "normal"];
          if (level >= 2) tipos.push("zigzag");
          if (level >= 3) tipos.push("fast");
          if (level >= 4) tipos.push("tank");

          const tipo = tipos[Math.floor(Math.random() * tipos.length)];
          const enemy = {
            x: Math.random() * (canvas.width - ENEMY_SIZE),
            y: -ENEMY_SIZE,
            type: tipo,
            health: tipo === "tank" ? 3 : 1,
            emoji:
              tipo === "tank"
                ? "🛸"
                : tipo === "fast"
                  ? "👾"
                  : tipo === "zigzag"
                    ? "👽"
                    : "👾",
          };
          enemies.push(enemy);
        }

        // Generar power-ups ocasionalmente
        if (Math.random() < 0.002 && level >= 2) {
          powerups.push({
            x: Math.random() * (canvas.width - 30),
            y: -30,
            type: Math.random() < 0.5 ? "health" : "score",
            emoji: Math.random() < 0.5 ? "❤️" : "⭐",
          });
        }
      }

      // ============================================================
      //  DIBUJAR
      // ============================================================
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fondo con gradiente
        const gradient = ctx.createRadialGradient(
          canvas.width / 2,
          canvas.height / 2,
          50,
          canvas.width / 2,
          canvas.height / 2,
          400,
        );
        gradient.addColorStop(0, "#2a0050");
        gradient.addColorStop(0.5, "#1a0033");
        gradient.addColorStop(1, "#0a001a");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawStars();

        // Power-ups
        for (const p of powerups) {
          ctx.font = "24px Arial";
          ctx.textAlign = "center";
          ctx.fillText(p.emoji, p.x + 15, p.y + 20);
        }

        // Balas enemigas
        for (const b of enemyBullets) {
          ctx.fillStyle = "#ff4444";
          ctx.shadowColor = "#ff4444";
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(b.x + 4, b.y, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        // Balas del jugador
        for (const b of bullets) {
          ctx.fillStyle = "#66ccff";
          ctx.shadowColor = "#66ccff";
          ctx.shadowBlur = 15;
          ctx.fillRect(b.x, b.y, b.w, b.h);
          ctx.shadowBlur = 0;
        }

        // Enemigos
        for (const e of enemies) {
          ctx.font = `${ENEMY_SIZE}px Arial`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          // Sombra
          ctx.shadowColor = "rgba(255, 0, 100, 0.3)";
          ctx.shadowBlur = 20;
          ctx.fillText(e.emoji, e.x + ENEMY_SIZE / 2, e.y + ENEMY_SIZE / 2);
          ctx.shadowBlur = 0;

          // Barra de vida para tanques
          if (e.type === "tank" && e.health > 1) {
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            ctx.fillRect(e.x, e.y - 10, ENEMY_SIZE, 4);
            ctx.fillStyle = "#ff6b6b";
            ctx.fillRect(e.x, e.y - 10, ENEMY_SIZE * (e.health / 3), 4);
          }
        }

        // Partículas
        drawParticles();

        // Nave
        ctx.shadowColor = "rgba(204, 51, 255, 0.5)";
        ctx.shadowBlur = 30;
        ctx.font = `${SHIP_W}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🚀", ship.x + SHIP_W / 2, ship.y + SHIP_H / 2);
        ctx.shadowBlur = 0;

        // Escudo visual (cuando hay combo alto)
        if (combo >= 5) {
          ctx.strokeStyle = `rgba(255, 215, 0, ${0.3 + Math.sin(frameCount * 0.05) * 0.2})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(ship.x + SHIP_W / 2, ship.y + SHIP_H / 2, 30, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Combo display
        if (combo > 1) {
          ctx.fillStyle = "#ffd700";
          ctx.font = "bold 18px Nunito, sans-serif";
          ctx.textAlign = "right";
          ctx.textBaseline = "top";
          ctx.fillText(`🔥 x${combo}`, canvas.width - 15, 10);
        }

        // Nivel display
        ctx.fillStyle = "rgba(204, 51, 255, 0.5)";
        ctx.font = "bold 14px Nunito, sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`Nivel ${level}`, 10, 10);
      }

      // ============================================================
      //  COLISIONES
      // ============================================================
      function checkCollisions() {
        // Balas vs Enemigos
        for (let i = bullets.length - 1; i >= 0; i--) {
          for (let j = enemies.length - 1; j >= 0; j--) {
            const b = bullets[i];
            const e = enemies[j];
            if (
              b &&
              e &&
              b.x < e.x + ENEMY_SIZE &&
              b.x + b.w > e.x &&
              b.y < e.y + ENEMY_SIZE &&
              b.y + b.h > e.y
            ) {
              // Daño al enemigo
              e.health -= b.damage;
              bullets.splice(i, 1);
              createExplosion(
                e.x + ENEMY_SIZE / 2,
                e.y + ENEMY_SIZE / 2,
                "#ff66cc",
                10,
              );

              if (e.health <= 0) {
                const puntos =
                  e.type === "tank" ? 30 : e.type === "fast" ? 20 : 15;
                score += puntos;
                kills++;
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                createExplosion(
                  e.x + ENEMY_SIZE / 2,
                  e.y + ENEMY_SIZE / 2,
                  "#ff66cc",
                  25,
                );
                enemies.splice(j, 1);

                // Subir nivel cada 15 eliminados
                if (kills % 15 === 0 && kills > 0) {
                  level++;
                  // Bonus de vida al subir nivel
                  health = Math.min(5, health + 1);
                }
              }
              break;
            }
          }
        }

        // Enemigos vs Nave
        for (let i = enemies.length - 1; i >= 0; i--) {
          const e = enemies[i];
          if (
            e.x < ship.x + SHIP_W &&
            e.x + ENEMY_SIZE > ship.x &&
            e.y < ship.y + SHIP_H &&
            e.y + ENEMY_SIZE > ship.y
          ) {
            createExplosion(
              ship.x + SHIP_W / 2,
              ship.y + SHIP_H / 2,
              "#ff4444",
              30,
            );
            health--;
            enemies.splice(i, 1);
            combo = 0;
            if (health <= 0) {
              terminarJuego();
              return;
            }
          }
        }

        // Balas enemigas vs Nave
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
          const b = enemyBullets[i];
          if (
            b.x < ship.x + SHIP_W &&
            b.x + 8 > ship.x &&
            b.y < ship.y + SHIP_H &&
            b.y + 8 > ship.y
          ) {
            createExplosion(
              ship.x + SHIP_W / 2,
              ship.y + SHIP_H / 2,
              "#ff4444",
              15,
            );
            health--;
            enemyBullets.splice(i, 1);
            combo = 0;
            if (health <= 0) {
              terminarJuego();
              return;
            }
          }
        }

        // Power-ups vs Nave
        for (let i = powerups.length - 1; i >= 0; i--) {
          const p = powerups[i];
          if (
            p.x < ship.x + SHIP_W &&
            p.x + 30 > ship.x &&
            p.y < ship.y + SHIP_H &&
            p.y + 30 > ship.y
          ) {
            if (p.type === "health") {
              health = Math.min(5, health + 1);
              createExplosion(p.x + 15, p.y + 15, "#ff6b6b", 10);
            } else {
              score += 50;
              createExplosion(p.x + 15, p.y + 15, "#ffd700", 10);
            }
            powerups.splice(i, 1);
          }
        }
      }

      // ============================================================
      //  ACTUALIZAR HUD
      // ============================================================
      function actualizarHUD() {
        scoreDisp.textContent = score;
        healthDisp.textContent = "❤️".repeat(Math.min(health, 5));
        levelDisp.textContent = level;
        killsDisp.textContent = kills;
      }

      // ============================================================
      //  TERMINAR JUEGO
      // ============================================================
      function terminarJuego() {
        gameActive = false;
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }
        btnStart.disabled = false;
        btnStart.textContent = "🚀 Iniciar Misión";

        finalScore.textContent = score;
        finalStats.textContent = `Nivel: ${level} | Eliminados: ${kills} | Combo máximo: x${maxCombo}`;
        gameOverOverlay.classList.add("show");

        // Guardar puntuación
        setTimeout(() => {
          const nombre = prompt(
            `💥 ¡Game Over!\nPuntuación: ${score}\nNivel: ${level}\n\n✨ Ingresa tu nombre para el récord:`,
          );
          if (nombre && nombre.trim()) {
            guardarPuntuacion(nombre.trim(), score);
          }
        }, 500);
      }

      // ============================================================
      //  REINICIAR JUEGO
      // ============================================================
      function reiniciarJuego() {
        gameOverOverlay.classList.remove("show");
        iniciarJuego();
      }

      function resetGame() {
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }
        gameActive = false;
        score = 0;
        health = 3;
        level = 1;
        kills = 0;
        combo = 0;
        maxCombo = 0;
        ship.x = canvas.width / 2 - SHIP_W / 2;
        bullets = [];
        enemies = [];
        particles = [];
        powerups = [];
        enemyBullets = [];
        gameOverOverlay.classList.remove("show");
        btnStart.disabled = false;
        btnStart.textContent = "🚀 Iniciar Misión";
        actualizarHUD();
        draw();
        cargarRecords();
      }

      // ============================================================
      //  GUARDAR PUNTUACIÓN
      // ============================================================
      function guardarPuntuacion(nombre, puntos) {
        fetch("/guardar_shooter", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nombre: nombre, puntos: puntos }),
        })
          .then(() => cargarRecords())
          .catch(() => {});
      }

      // ============================================================
      //  CARGAR RÉCORDS
      // ============================================================
      function cargarRecords() {
        fetch("/records_shooter")
          .then((r) => r.json())
          .then((data) => {
            recordsGrid.innerHTML = "";
            if (data && data.length > 0) {
              data.slice(0, 10).forEach((item, i) => {
                const div = document.createElement("div");
                div.className = "record-item";
                div.innerHTML = `
                  <span class="name">${i + 1}. ${item.nombre}</span>
                  <span class="score">${item.puntos} pts</span>
                `;
                recordsGrid.appendChild(div);
              });
            } else {
              recordsGrid.innerHTML = `<div class="record-item"><span class="name">✨ Sin récords aún</span></div>`;
            }
          })
          .catch(() => {});
      }

      // ============================================================
      //  EVENTOS DE TECLADO
      // ============================================================
      document.addEventListener("keydown", (e) => {
        keys[e.key] = true;
        if (e.key === " " || e.key === "Space") {
          e.preventDefault();
          disparar();
        }
        // Disparo con Z también
        if (e.key === "z" || e.key === "Z") {
          disparar();
        }
      });

      document.addEventListener("keyup", (e) => {
        keys[e.key] = false;
      });

      // ============================================================
      //  CONTROLES MÓVILES
      // ============================================================
      const btnLeft = document.getElementById("btnLeft");
      const btnRight = document.getElementById("btnRight");
      const btnFire = document.getElementById("btnFire");

      // Touch / Mouse para móvil
      function setupMobileControls() {
        const moveSpeed = 8;

        // Botón izquierdo
        btnLeft.addEventListener("touchstart", (e) => {
          e.preventDefault();
          keys["ArrowLeft"] = true;
        });
        btnLeft.addEventListener("touchend", (e) => {
          e.preventDefault();
          keys["ArrowLeft"] = false;
        });
        btnLeft.addEventListener("mousedown", () => {
          keys["ArrowLeft"] = true;
        });
        btnLeft.addEventListener("mouseup", () => {
          keys["ArrowLeft"] = false;
        });
        btnLeft.addEventListener("mouseleave", () => {
          keys["ArrowLeft"] = false;
        });

        // Botón derecho
        btnRight.addEventListener("touchstart", (e) => {
          e.preventDefault();
          keys["ArrowRight"] = true;
        });
        btnRight.addEventListener("touchend", (e) => {
          e.preventDefault();
          keys["ArrowRight"] = false;
        });
        btnRight.addEventListener("mousedown", () => {
          keys["ArrowRight"] = true;
        });
        btnRight.addEventListener("mouseup", () => {
          keys["ArrowRight"] = false;
        });
        btnRight.addEventListener("mouseleave", () => {
          keys["ArrowRight"] = false;
        });

        // Botón de disparo
        let fireInterval = null;
        btnFire.addEventListener("touchstart", (e) => {
          e.preventDefault();
          disparar();
          fireInterval = setInterval(disparar, 150);
        });
        btnFire.addEventListener("touchend", (e) => {
          e.preventDefault();
          if (fireInterval) {
            clearInterval(fireInterval);
            fireInterval = null;
          }
        });
        btnFire.addEventListener("mousedown", () => {
          disparar();
          fireInterval = setInterval(disparar, 150);
        });
        btnFire.addEventListener("mouseup", () => {
          if (fireInterval) {
            clearInterval(fireInterval);
            fireInterval = null;
          }
        });
        btnFire.addEventListener("mouseleave", () => {
          if (fireInterval) {
            clearInterval(fireInterval);
            fireInterval = null;
          }
        });
      }

      // ============================================================
      //  INICIALIZAR
      // ============================================================
      function init() {
        initStars();
        cargarRecords();
        setupMobileControls();
        draw();

        // Tecla Enter para iniciar
        document.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !gameActive) {
            iniciarJuego();
          }
        });
      }

      // Cargar cuando la página esté lista
      document.addEventListener("DOMContentLoaded", init);
    </script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
  </body>
</html>
