<!doctype html>
<html lang="es">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <meta charset="UTF-8" />
    <title>Rally Kawaii</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Nunito", sans-serif;
        background: linear-gradient(135deg, #ffb3b3 0%, #ffccff 100%);
        margin: 0;
        padding: 20px;
        text-align: center;
        color: #ff0055;
      }

      #game-container {
        display: inline-block;
        background: white;
        padding: 20px;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(255, 0, 85, 0.2);
        border: 4px dashed #ff6688;
        position: relative;
      }

      canvas {
        background: #555;
        border: 4px solid #ff3366;
        border-radius: 15px;
      }

      .hud {
        display: flex;
        justify-content: space-around;
        width: 360px;
        margin: 0 auto 10px auto;
        font-size: 1.5em;
        font-weight: 900;
        color: #ff0055;
      }

      .btn-juego {
        background: linear-gradient(45deg, #ff4d4d, #ff0055);
        color: white;
        border: none;
        padding: 12px 30px;
        font-size: 1.2em;
        border-radius: 50px;
        cursor: pointer;
        font-weight: bold;
        margin: 10px;
        box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
        text-decoration: none;
        display: inline-block;
        transition: 0.2s;
      }

      .btn-juego:hover {
        transform: scale(1.05);
      }

      #overlay {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 30px;
        width: 80%;
        border: 4px dashed #ff3366;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <div id="game-container">
      <h1 style="margin-top: 0">🏎️ Rally Kawaii 🚙</h1>

      <div class="hud">
        <div>Distancia: <span id="score">0</span>m</div>
        <div>Nivel: <span id="nivel">1</span></div>
      </div>

      <canvas id="gameCanvas" width="360" height="500"></canvas>
      <div class="controles-movil">
        <div
          class="btn-control"
          onmousedown="teclas.Izq = true"
          onmouseup="teclas.Izq = false"
          onmouseleave="teclas.Izq = false"
          ontouchstart="teclas.Izq=true"
          ontouchend="teclas.Izq=false"
        >
          ⬅️
        </div>
        <div
          class="btn-control"
          onmousedown="teclas.Der = true"
          onmouseup="teclas.Der = false"
          onmouseleave="teclas.Der = false"
          ontouchstart="teclas.Der=true"
          ontouchend="teclas.Der=false"
        >
          ➡️
        </div>
      </div>
      <br />
      <button class="btn-juego" onclick="iniciarJuego()">
        ▶️ Iniciar Carrera
      </button>
      <a
        href="/secreto"
        class="btn-juego"
        style="background: #fff; color: #ff0055; border: 2px solid #ff0055"
        >🏠 Menú</a
      >

      <div id="overlay">
        <h2 style="color: #ff0055; font-size: 2.5em; margin: 0">¡Crash! 💥</h2>
        <p style="font-size: 1.5em; color: #666">
          Llegaste al <b>Nivel <span id="final-nivel"></span></b> con
          <b id="final-score"></b> metros.
        </p>
        <button class="btn-juego" onclick="guardar()">💾 Guardar Récord</button>
        <button
          class="btn-juego"
          onclick="location.reload()"
          style="background: #ccc"
        >
          🔄 Reintentar
        </button>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const anchoCarril = 120;
      const carriles = [20, 140, 260];
      let carrilActual = 1;

      let jugadorY = 400;
      let obstaculos = [];
      let score = 0;
      let nivel = 1;
      let gameActivo = false;
      let frameId;
      let velocidad = 5;
      let lineasY = 0;
      let timerObstaculos;

      function iniciarJuego() {
        if (gameActivo) return;
        obstaculos = [];
        score = 0;
        nivel = 1;
        velocidad = 5;
        carrilActual = 1;
        lineasY = 0;

        document.getElementById("score").innerText = score;
        document.getElementById("nivel").innerText = nivel;
        document.getElementById("overlay").style.display = "none";
        gameActivo = true;

        programarObstaculo();
        frameId = requestAnimationFrame(gameLoop);
      }

      function programarObstaculo() {
        if (!gameActivo) return;
        crearObstaculo();

        // Fórmula mágica: Conforme sube el nivel, el tiempo entre obstáculos baja
        // Empieza en 1.2 segundos y se va haciendo más corto (hasta un límite de 0.4s para no hacerlo imposible)
        let tiempoSpawn = Math.max(400, 1200 - nivel * 100);
        timerObstaculos = setTimeout(programarObstaculo, tiempoSpawn);
      }

      function crearObstaculo() {
        const carrilRandom = Math.floor(Math.random() * 3);
        const esBomba = Math.random() < 0.3;
        obstaculos.push({
          x: carriles[carrilRandom] + 20,
          y: -60,
          w: 40,
          h: 40,
          emoji: esBomba ? "💣" : "🚧",
        });
      }

      function gameLoop() {
        if (!gameActivo) return;

        // Avanzar distancia
        score += 1;
        document.getElementById("score").innerText = score;

        // Subir de nivel cada 400 metros
        if (score % 400 === 0) {
          nivel += 1;
          velocidad += 1.5; // Aumenta la velocidad de la calle y objetos
          document.getElementById("nivel").innerText = nivel;
        }

        // Mover la carretera
        lineasY += velocidad;
        if (lineasY >= 40) lineasY = 0;

        // Limpiar pantalla
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dibujar Carretera
        ctx.fillStyle = "#fff";
        for (let i = 0; i < canvas.height + 40; i += 40) {
          ctx.fillRect(118, i + lineasY - 40, 4, 20);
          ctx.fillRect(238, i + lineasY - 40, 4, 20);
        }

        // Mover y dibujar obstáculos
        for (let i = 0; i < obstaculos.length; i++) {
          let obs = obstaculos[i];
          obs.y += velocidad;

          ctx.font = "35px Arial";
          ctx.fillText(obs.emoji, obs.x, obs.y + 30);

          // Colisiones más precisas (hitbox ajustada)
          let jugadorX = carriles[carrilActual] + 20;
          let margenObjeto = 5;
          let margenJugador = 10;

          if (
            obs.y + obs.h - margenObjeto > jugadorY + margenJugador &&
            obs.y + margenObjeto < jugadorY + 50 - margenJugador &&
            obs.x + obs.w - margenObjeto > jugadorX + margenJugador &&
            obs.x + margenObjeto < jugadorX + 40 - margenJugador
          ) {
            terminarJuego();
            return;
          }

          if (obs.y > canvas.height) {
            obstaculos.splice(i, 1);
            i--;
          }
        }

        // Dibujar jugador
        let xActual = carriles[carrilActual] + 20;
        ctx.font = "40px Arial";
        ctx.fillText("🚙", xActual, jugadorY + 40);

        frameId = requestAnimationFrame(gameLoop);
      }

      function terminarJuego() {
        gameActivo = false;
        clearTimeout(timerObstaculos);
        cancelAnimationFrame(frameId);
        document.getElementById("final-score").innerText = score;
        document.getElementById("final-nivel").innerText = nivel;
        document.getElementById("overlay").style.display = "block";
      }

      // Controles de movimiento
      document.addEventListener("keydown", (e) => {
        if (!gameActivo) return;
        if (e.key === "ArrowLeft" && carrilActual > 0) {
          carrilActual--;
          e.preventDefault();
        }
        if (e.key === "ArrowRight" && carrilActual < 2) {
          carrilActual++;
          e.preventDefault();
        }
      });

      function guardar() {
        let nombre = prompt(
          `Llegaste al Nivel ${nivel}. Ingresa tu nombre de piloto:`,
        );
        if (nombre) {
          fetch("/guardar_rally", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              nombre: nombre,
              puntos: score,
            }),
          }).then(() => (window.location.href = "/secreto"));
        }
      }
    </script>
  </body>
</html>
