<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>☕ Kitty Cafe Dash</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Nunito", sans-serif;
        background: linear-gradient(135deg, #fff0f5, #ffe6f2, #fff0f5);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .kawaii-box {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        padding: 30px 25px;
        border-radius: 40px;
        border: 4px dashed #ff99cc;
        box-shadow: 0 20px 60px rgba(255, 51, 133, 0.2);
        max-width: 500px;
        width: 100%;
        text-align: center;
      }

      h1 {
        color: #ff3385;
        font-size: 2.5rem;
        text-shadow: 3px 3px 0 #ffb3d9;
        margin-bottom: 5px;
      }

      .subtitle {
        color: #ff6b9d;
        font-size: 0.9rem;
        margin-bottom: 15px;
      }

      .hud-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 15px;
      }

      .hud-item {
        background: #fff5f9;
        border-radius: 15px;
        padding: 8px 5px;
        border: 2px solid #ffccdd;
      }

      .hud-item .label {
        font-size: 0.55rem;
        color: #cc99aa;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .hud-item .value {
        font-size: 1.5rem;
        font-weight: 900;
        color: #ff3385;
      }

      .hud-item .value.timer-warning {
        color: #ff4444;
        animation: pulse-timer 0.5s ease-in-out infinite alternate;
      }

      @keyframes pulse-timer {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scale(1.1);
        }
      }

      .pedido-container {
        background: linear-gradient(135deg, #fff5f9, #ffe6f2);
        border-radius: 25px;
        padding: 20px;
        margin: 15px 0;
        border: 3px solid #ff99cc;
        min-height: 100px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .pedido-container .cliente {
        font-size: 0.9rem;
        color: #ff6b9d;
        font-weight: 700;
        margin-bottom: 5px;
      }

      .pedido-container .pedido-texto {
        font-size: 3.5rem;
        line-height: 1.2;
        transition: all 0.3s ease;
      }

      .pedido-container .pista {
        font-size: 0.8rem;
        color: #cc99aa;
        margin-top: 5px;
      }

      .botones-container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin: 15px 0;
      }

      .btn-ingrediente {
        font-size: 2.2rem;
        padding: 15px 10px;
        cursor: pointer;
        border: none;
        border-radius: 20px;
        background: #ffe6f2;
        box-shadow: 0 6px 0 #ffb3d9;
        transition: all 0.1s ease;
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        min-height: 70px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
      }

      .btn-ingrediente .btn-label {
        font-size: 0.55rem;
        color: #ff6b9d;
        font-weight: 700;
      }

      .btn-ingrediente:active {
        transform: translateY(6px);
        box-shadow: 0 0 0 #ffb3d9;
      }

      .btn-ingrediente:hover:not(:disabled) {
        background: #ffccdd;
        transform: scale(1.05);
      }

      .btn-ingrediente:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .correct-flash {
        animation: flash-green 0.5s ease;
      }

      .wrong-flash {
        animation: flash-red 0.5s ease;
      }

      @keyframes flash-green {
        0%,
        100% {
          background: #ffe6f2;
        }
        50% {
          background: #b8f0b8;
          border-color: #00b894;
        }
      }

      @keyframes flash-red {
        0%,
        100% {
          background: #ffe6f2;
        }
        50% {
          background: #ffb3b3;
          border-color: #e17055;
        }
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin: 15px 0;
      }

      .btn {
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        font-family: "Nunito", sans-serif;
        font-weight: 900;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #ff6b9d, #ff3385);
        color: white;
        box-shadow: 0 6px 20px rgba(255, 51, 133, 0.35);
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(255, 51, 133, 0.45);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .btn-secondary {
        background: white;
        color: #ff3385;
        border: 3px solid #ff3385;
      }

      .btn-secondary:hover {
        background: #ff3385;
        color: white;
        transform: translateY(-3px);
      }

      .back-link {
        display: inline-block;
        margin-top: 10px;
        color: #ff3385;
        font-weight: 900;
        text-decoration: none;
        padding: 8px 20px;
        border-radius: 30px;
        border: 2px solid #ff3385;
        transition: all 0.3s ease;
        font-size: 0.9rem;
      }

      .back-link:hover {
        background: #ff3385;
        color: white;
      }

      @media (max-width: 500px) {
        .kawaii-box {
          padding: 20px 15px;
        }

        h1 {
          font-size: 2rem;
        }

        .botones-container {
          grid-template-columns: repeat(3, 1fr);
        }

        .btn-ingrediente {
          font-size: 1.8rem;
          min-height: 60px;
          padding: 10px 5px;
        }

        .pedido-container .pedido-texto {
          font-size: 2.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="kawaii-box">
      <h1>☕ Kitty Cafe Dash</h1>
      <p class="subtitle">
        ✨ Sirve los pedidos antes de que se acabe el tiempo
      </p>

      <div class="hud-container">
        <div class="hud-item">
          <div class="label">⭐ Puntos</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="hud-item">
          <div class="label">⏱️ Tiempo</div>
          <div class="value" id="timer">30</div>
        </div>
        <div class="hud-item">
          <div class="label">📊 Nivel</div>
          <div class="value" id="nivel">1</div>
        </div>
      </div>

      <div class="pedido-container" id="pedidoContainer">
        <div class="cliente" id="clienteText">🐱 Cliente:</div>
        <div class="pedido-texto" id="pedidoTexto">¡Presiona Iniciar! 🎀</div>
        <div class="pista" id="pistaText">
          💡 Elige los ingredientes correctos
        </div>
      </div>

      <div class="botones-container">
        <button
          class="btn-ingrediente"
          onclick="preparar('☕')"
          id="btn-coffee"
        >
          ☕
          <span class="btn-label">Café</span>
        </button>
        <button class="btn-ingrediente" onclick="preparar('🍰')" id="btn-cake">
          🍰
          <span class="btn-label">Pastel</span>
        </button>
        <button class="btn-ingrediente" onclick="preparar('🍵')" id="btn-tea">
          🍵
          <span class="btn-label">Té</span>
        </button>
        <button
          class="btn-ingrediente"
          onclick="preparar('🍪')"
          id="btn-cookie"
        >
          🍪
          <span class="btn-label">Galleta</span>
        </button>
      </div>

      <div class="controls">
        <button class="btn btn-primary" onclick="iniciar()" id="btn-start">
          ▶️ Iniciar Turno
        </button>
        <button class="btn btn-secondary" onclick="resetGame()">
          🔄 Reiniciar
        </button>
      </div>

      <a href="/secreto" class="back-link">🏠 Volver al Menú</a>
    </div>

    <script>
      // ============================================================
      //  CONFIGURACIÓN
      // ============================================================
      let score = 0;
      let timer = 30;
      let timerMax = 30;
      let nivel = 1;
      let pedidoActual = [];
      let pedidoCompleto = [];
      let juegoActivo = false;
      let intervaloTimer = null;
      let pedidosCompletados = 0;
      let totalCorrectos = 0;
      let totalErrores = 0;
      let procesandoPedido = false; // <--- NUEVO: evita múltiples clics

      const clientes = [
        {
          nombre: "Mochi",
          emoji: "🐱",
          frases: ["¡Hola! Quiero", "Necesito", "Dame un"],
        },
        {
          nombre: "Luna",
          emoji: "🐰",
          frases: ["¡Miau! Traeme", "Quisiera", "Antojo de"],
        },
        {
          nombre: "Neko",
          emoji: "🐱",
          frases: ["¡Purr! Dame", "Quiero un", "Necesito un"],
        },
        {
          nombre: "Koko",
          emoji: "🐶",
          frases: ["¡Woof! Trae", "Dame un", "Quiero"],
        },
        {
          nombre: "Pochi",
          emoji: "🐹",
          frases: ["¡Squeak!", "Quiero un", "Traeme un"],
        },
        {
          nombre: "Mimi",
          emoji: "🐱",
          frases: ["¡Hola! Un", "Dame un", "Por favor un"],
        },
      ];

      // Recetas simples (solo 1 ingrediente para evitar complicaciones)
      const recetas = {
        "☕": { nombre: "Café", emoji: "☕", ingredientes: ["☕"] },
        "🍰": { nombre: "Pastel", emoji: "🍰", ingredientes: ["🍰"] },
        "🍵": { nombre: "Té", emoji: "🍵", ingredientes: ["🍵"] },
        "🍪": { nombre: "Galleta", emoji: "🍪", ingredientes: ["🍪"] },
      };

      const recetasList = Object.keys(recetas);

      const scoreDisp = document.getElementById("score");
      const timerDisp = document.getElementById("timer");
      const nivelDisp = document.getElementById("nivel");
      const pedidoTexto = document.getElementById("pedidoTexto");
      const clienteText = document.getElementById("clienteText");
      const pistaText = document.getElementById("pistaText");
      const pedidoContainer = document.getElementById("pedidoContainer");
      const btnStart = document.getElementById("btn-start");

      // ============================================================
      //  INICIO DEL JUEGO
      // ============================================================
      function iniciar() {
        if (juegoActivo) return;

        juegoActivo = true;
        score = 0;
        timer = timerMax;
        nivel = 1;
        pedidosCompletados = 0;
        totalCorrectos = 0;
        totalErrores = 0;
        procesandoPedido = false;

        btnStart.disabled = true;
        btnStart.textContent = "⏳ Jugando...";

        actualizarHUD();
        nuevoPedido();

        if (intervaloTimer) clearInterval(intervaloTimer);
        intervaloTimer = setInterval(() => {
          timer--;
          actualizarHUD();

          if (timer <= 0) {
            clearInterval(intervaloTimer);
            terminar("⏰ ¡Tiempo agotado!");
          }

          if (timer <= 5) {
            timerDisp.classList.add("timer-warning");
          } else {
            timerDisp.classList.remove("timer-warning");
          }
        }, 1000);
      }

      // ============================================================
      //  NUEVO PEDIDO
      // ============================================================
      function nuevoPedido() {
        // Elegir receta aleatoria simple
        const recetaKey =
          recetasList[Math.floor(Math.random() * recetasList.length)];
        const receta = recetas[recetaKey];
        pedidoActual = [...receta.ingredientes];
        pedidoCompleto = [...receta.ingredientes];

        const cliente = clientes[Math.floor(Math.random() * clientes.length)];
        const frase =
          cliente.frases[Math.floor(Math.random() * cliente.frases.length)];

        clienteText.textContent = `${cliente.emoji} ${cliente.nombre}: ${frase}`;
        pedidoTexto.textContent = receta.emoji;
        pistaText.textContent = `💡 Presiona el ingrediente correcto`;

        pedidoContainer.style.transform = "scale(0.9)";
        setTimeout(() => {
          pedidoContainer.style.transform = "scale(1)";
        }, 100);

        procesandoPedido = false; // <--- Reactivar los clics
      }

      // ============================================================
      //  PREPARAR INGREDIENTE (CORREGIDO)
      // ============================================================
      function preparar(ingrediente) {
        // 1. Verificar si el juego está activo
        if (!juegoActivo) return;

        // 2. Verificar si ya se procesó el pedido
        if (procesandoPedido) return;

        // 3. Verificar si el pedido ya se completó
        if (pedidoActual.length === 0) return;

        // 4. Verificar si el ingrediente es correcto
        const index = pedidoActual.indexOf(ingrediente);

        if (index !== -1) {
          // ¡Correcto!
          pedidoActual.splice(index, 1);
          totalCorrectos++;

          // Efecto visual
          pedidoContainer.classList.remove("wrong-flash");
          pedidoContainer.classList.add("correct-flash");
          setTimeout(() => {
            pedidoContainer.classList.remove("correct-flash");
          }, 500);

          // Mostrar progreso
          const restantes = pedidoActual.length;
          if (restantes > 0) {
            pistaText.textContent = `✅ ¡Bien! ${restantes} ingrediente${restantes > 1 ? "s" : ""} restante${restantes > 1 ? "s" : ""}`;
          }

          // Si completó el pedido
          if (pedidoActual.length === 0) {
            procesandoPedido = true; // <--- Bloquear más clics
            completarPedido();
          }
        } else {
          // ¡Error!
          totalErrores++;

          // Efecto visual
          pedidoContainer.classList.remove("correct-flash");
          pedidoContainer.classList.add("wrong-flash");
          setTimeout(() => {
            pedidoContainer.classList.remove("wrong-flash");
          }, 500);

          pistaText.textContent = `❌ ¡Eso no va aquí! Los ingredientes son: ${pedidoCompleto.join(" + ")}`;

          // Perder 5 puntos (pero no menos de 0)
          score = Math.max(0, score - 5);
          actualizarHUD();

          // Si tiene muchos errores, terminar el juego
          if (totalErrores >= 5) {
            terminar("😅 ¡Demasiados errores!");
          }
        }
      }

      // ============================================================
      //  COMPLETAR PEDIDO
      // ============================================================
      function completarPedido() {
        pedidosCompletados++;

        // Calcular puntos
        let puntosBase = 10;
        let puntosBonus = Math.floor(timer / 5);
        let puntosTotales = puntosBase + puntosBonus;
        score += puntosTotales;

        // Subir de nivel cada 5 pedidos
        if (pedidosCompletados % 5 === 0) {
          nivel++;
          timerMax = Math.max(15, timerMax - 1);
          timer = Math.min(timer + 3, timerMax);
          pistaText.textContent = `⬆️ ¡NIVEL ${nivel}! 🎉`;
        }

        // Bonus de tiempo
        timer = Math.min(timer + 1, timerMax);

        actualizarHUD();

        // Nuevo pedido después de un breve retraso
        setTimeout(() => {
          if (juegoActivo) {
            nuevoPedido();
          }
        }, 400);
      }

      // ============================================================
      //  ACTUALIZAR HUD
      // ============================================================
      function actualizarHUD() {
        scoreDisp.textContent = score;
        timerDisp.textContent = timer;
        nivelDisp.textContent = nivel;
      }

      // ============================================================
      //  TERMINAR JUEGO
      // ============================================================
      function terminar(mensaje) {
        juegoActivo = false;
        if (intervaloTimer) {
          clearInterval(intervaloTimer);
          intervaloTimer = null;
        }

        btnStart.disabled = false;
        btnStart.textContent = "🔄 Jugar de nuevo";

        pedidoTexto.textContent = mensaje;
        pistaText.textContent = `📊 Puntos: ${score} | Pedidos: ${pedidosCompletados}`;

        // Guardar puntuación
        setTimeout(() => {
          const nombre = prompt(
            `${mensaje}\n\n📊 Puntuación final: ${score}\nPedidos completados: ${pedidosCompletados}\nNivel: ${nivel}\n\n✨ Ingresa tu nombre para el récord:`,
          );
          if (nombre && nombre.trim()) {
            guardarPuntuacion(nombre.trim(), score);
          }
        }, 500);
      }

      // ============================================================
      //  GUARDAR PUNTUACIÓN
      // ============================================================
      function guardarPuntuacion(nombre, puntos) {
        fetch("/guardar_cafe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nombre: nombre, puntos: puntos }),
        })
          .then(() => {})
          .catch(() => {});
      }

      // ============================================================
      //  REINICIAR
      // ============================================================
      function resetGame() {
        if (intervaloTimer) {
          clearInterval(intervaloTimer);
          intervaloTimer = null;
        }
        juegoActivo = false;
        score = 0;
        timer = timerMax;
        nivel = 1;
        pedidosCompletados = 0;
        totalCorrectos = 0;
        totalErrores = 0;
        pedidoActual = [];
        pedidoCompleto = [];
        procesandoPedido = false;

        btnStart.disabled = false;
        btnStart.textContent = "▶️ Iniciar Turno";

        pedidoTexto.textContent = "¡Listo para jugar! 🎀";
        pistaText.textContent = '💡 Presiona "Iniciar Turno" para comenzar';
        clienteText.textContent = "🐱 Cliente: ";
        pedidoContainer.classList.remove("correct-flash", "wrong-flash");

        actualizarHUD();
        timerDisp.classList.remove("timer-warning");
      }

      // ============================================================
      //  INICIALIZAR
      // ============================================================
      document.addEventListener("DOMContentLoaded", resetGame);
    </script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
  </body>
</html>
