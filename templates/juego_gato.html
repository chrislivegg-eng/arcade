<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


    <meta charset="UTF-8">
    <title>Gato: Salas Privadas ❌⭕</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f3e6ff; text-align: center; margin: 0; padding: 20px; }
        .kawaii-box { background: white; padding: 30px; border-radius: 40px; border: 4px dashed #d9b3ff; display: inline-block; box-shadow: 0 10px 20px rgba(217, 179, 255, 0.4); max-width: 600px; width: 100%;}
        
        h1 { color: #9933ff; margin-top: 0; font-size: 2.5em; cursor: pointer; user-select: none; }
        
        .menu-modos { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 20px; }
        .btn-modo { font-size: 1.5em; padding: 15px 30px; border: none; border-radius: 30px; cursor: pointer; color: white; font-weight: bold; width: 80%; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-modo:hover { transform: scale(1.05); }
        .btn-facil { background: linear-gradient(45deg, #66ccff, #0099ff); display: none; }
        .btn-imposible { background: linear-gradient(45deg, #ff6666, #ff0000); }
        .btn-online { background: linear-gradient(45deg, #9933ff, #cc33ff); }

        /* Estilos del Lobby */
        .caja-lobby { background: #faf5ff; border: 3px solid #e6ccff; border-radius: 20px; padding: 20px; margin-top: 20px; }
        .input-codigo { font-size: 1.5em; padding: 10px; width: 150px; text-align: center; border: 2px solid #d9b3ff; border-radius: 15px; text-transform: uppercase; outline: none; font-weight: bold; color: #9933ff;}
        .codigo-sala { font-size: 2em; color: #ff3385; background: #ffe6f2; padding: 5px 20px; border-radius: 20px; display: inline-block; border: 2px dashed #ff99cc; letter-spacing: 3px; }

        .selector-jugador { margin-bottom: 20px; font-size: 1.2em; color: #666; }
        .btn-seleccion { font-size: 1.5em; padding: 10px 20px; margin: 5px; cursor: pointer; border: 2px solid #ccc; border-radius: 15px; background: white; transition: 0.2s; }
        .btn-seleccion.activo { border-color: #9933ff; background: #e6ccff; transform: scale(1.1); box-shadow: 0 4px 10px rgba(153, 51, 255, 0.3); }

        .layout-juego { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        
        .tablero { display: grid; grid-template-columns: repeat(3, 90px); gap: 10px; }
        .celda { width: 90px; height: 90px; background: #f9f2ff; border: 3px solid #d9b3ff; border-radius: 20px; font-size: 3.5em; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: #333; }
        .celda:hover { background: #f0e6ff; transform: scale(1.05); }

        .caja-chat { background: #faf5ff; border: 2px solid #e6ccff; border-radius: 20px; width: 250px; display: flex; flex-direction: column; overflow: hidden; display: none; }
        .mensajes { flex-grow: 1; height: 200px; overflow-y: auto; padding: 10px; text-align: left; font-size: 0.9em; color: #555; }
        .input-chat { display: flex; border-top: 2px solid #e6ccff; }
        .input-chat input { flex-grow: 1; border: none; padding: 10px; outline: none; }
        .input-chat button { background: #9933ff; color: white; border: none; padding: 0 15px; cursor: pointer; font-weight: bold; }

        .info { font-size: 1.3em; color: #9933ff; font-weight: bold; margin: 15px 0; min-height: 30px; }
        .btn-accion { background: #ccc; color: #333; border: none; padding: 10px 25px; font-size: 1.1em; border-radius: 30px; cursor: pointer; margin-top: 10px; font-weight: bold; transition: 0.2s;}
        .btn-accion:hover { background: #bbb; }
    </style>
</head>
<body>
    <div class="kawaii-box">
        <h1 id="titulo-secreto" onclick="revelarSecreto()">❌ Gato Kawaii ⭕</h1>
        
        <div id="pantalla-menu">
            <h3 style="color: #666;">Elige un modo de juego:</h3>
            <div class="menu-modos">
                <button class="btn-modo btn-facil" id="bot-facil" onclick="iniciarModo('facil')">🤖 Bot Fácil (Secreto)</button>
                <button class="btn-modo btn-imposible" onclick="iniciarModo('imposible')">💀 Bot Imposible</button>
                <button class="btn-modo btn-online" onclick="abrirLobby()">🌐 Jugar en Línea</button>
            </div>
            <br>
            <a href="/secreto" style="color: #9933ff; text-decoration: none; font-weight: bold;">🏠 Volver al Centro de Juegos</a>
        </div>

        <div id="pantalla-lobby" style="display: none;">
            <h2 style="color: #9933ff;">Recepción Multijugador</h2>
            <div class="caja-lobby">
                <h3>Crear una nueva partida</h3>
                <button class="btn-accion" style="background: #00cc99; color: white; font-size: 1.3em;" onclick="crearSalaPrivada()">✨ Crear Sala Privada</button>
                    
                <hr style="border: 1px dashed #e6ccff; margin: 25px 0;">
                
                <h3>O únete a un amigo</h3>
                <input type="text" id="input-codigo" class="input-codigo" placeholder="Ej. A1B2" maxlength="4">
                <br>
                <button class="btn-accion" style="background: #9933ff; color: white;" onclick="unirseSalaPrivada()">Entrar a Sala</button>
            </div>
            <br>
            <button class="btn-accion" onclick="volverMenu()">⬅️ Volver</button>
        </div>

        <div id="pantalla-juego" style="display: none;">
            
            <div id="info-sala" style="display: none; margin-bottom: 15px;">
                <span style="color: #666; font-weight: bold;">Código de tu Sala:</span><br>
                <div class="codigo-sala" id="texto-codigo-sala">----</div>
                <div style="font-size: 0.9em; color: #888;">¡Pásale este código a tu amigo!</div>
            </div>

            <div id="etiqueta-modo" style="background: #e6ccff; color: #9933ff; padding: 5px 15px; border-radius: 20px; display: inline-block; font-weight: bold; margin-bottom: 5px;"></div>

        

            <div class="info" id="mensaje">Preparando...</div>

            <div class="layout-juego">
                <div class="tablero" id="tablero"></div>

                <div class="caja-chat" id="caja-chat">
                    <div class="mensajes" id="mensajes-chat"></div>
                    <div class="input-chat">
                        <input type="text" id="input-msj" placeholder="Escribe..." onkeypress="if(event.key === 'Enter') enviarChat()">
                        <button onclick="enviarChat()">Enviar</button>
                    </div>
                </div>
            </div>

            <br>
            <button class="btn-accion" onclick="reiniciarTablero()" style="background: #9933ff; color: white;">🔄 Reiniciar Partida</button>
            <button class="btn-accion" onclick="volverMenu()">⬅️ Salir de la Sala</button>
        </div>
    </div>

    <script>
        let modoActual = '';
        let miJugador = '❌'; 
        let turnoActual = '❌';
        let intervaloPoll = null;
        let tableroLocal = ["", "", "", "", "", "", "", "", ""];
        let juegoTerminado = false;
        let recordGuardado = false; 
        let clicsSecreto = 0;
        let salaActual = ''; // NUEVA VARIABLE PARA LA SALA PRIVADA

        // --- EASTER EGG ---
        function revelarSecreto() {
            clicsSecreto++;
            if (clicsSecreto === 5) {
                document.getElementById('bot-facil').style.display = 'block';
                document.getElementById('titulo-secreto').innerText = "❌ Gato (Modo Developer) ⭕";
                alert("¡Desbloqueaste el modo Bot Fácil!");
            }
        }

        // --- NAVEGACIÓN ---
        function abrirLobby() {
            document.getElementById('pantalla-menu').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('pantalla-lobby').style.display = 'block';
        }

        function iniciarModo(modo) {
            modoActual = modo;
            document.getElementById('pantalla-menu').style.display = 'none';
            document.getElementById('pantalla-lobby').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'block';
            juegoTerminado = false;
            recordGuardado = false;
            
            if (modo === 'online') {
                document.getElementById('etiqueta-modo').style.display = 'none'; // Ocultamos la etiqueta en online para dar espacio al código
                document.getElementById('info-sala').style.display = 'block';
                document.getElementById('texto-codigo-sala').innerText = salaActual;
                document.getElementById('selector-online').style.display = 'block';
                document.getElementById('caja-chat').style.display = 'flex';
                
                intervaloPoll = setInterval(sincronizarOnline, 1000);
                sincronizarOnline();
            } else {
                let txt = modo === 'facil' ? '🤖 Modo: Bot Fácil' : '💀 Modo: Bot Imposible';
                document.getElementById('etiqueta-modo').style.display = 'inline-block';
                document.getElementById('etiqueta-modo').innerText = txt;
                document.getElementById('info-sala').style.display = 'none';
                document.getElementById('selector-online').style.display = 'none';
                document.getElementById('caja-chat').style.display = 'none';
                miJugador = '❌'; 
                iniciarJuegoLocal();
            }
        }

        function volverMenu() {
            if (intervaloPoll) clearInterval(intervaloPoll);
            salaActual = ''; // Limpiamos la sala al salir
            document.getElementById('pantalla-juego').style.display = 'none';
            document.getElementById('pantalla-lobby').style.display = 'none';
            document.getElementById('pantalla-menu').style.display = 'block';
        }

        // --- GESTIÓN DE SALAS PRIVADAS ---
       function crearSalaPrivada() {
            fetch('/api/crear_sala_gato', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                salaActual = data.sala;
                miJugador = '❌'; // <-- Automáticamente eres la X
                iniciarModo('online');
            });
        }

        function unirseSalaPrivada() {
            let cod = document.getElementById('input-codigo').value.trim().toUpperCase();
            if (cod.length !== 4) return alert("El código debe tener 4 caracteres.");
            
            fetch('/api/estado_gato?sala=' + cod)
            .then(res => {
                if(res.ok) {
                    salaActual = cod;
                    miJugador = '⭕'; // <-- Automáticamente eres la O
                    iniciarModo('online');
                } else {
                    alert("Esa sala no existe. Revisa el código.");
                }
            });
        }

        // --- TABLERO VISUAL ---
        function dibujarTablero(tablero) {
            const contenedor = document.getElementById('tablero');
            contenedor.innerHTML = ''; 
            tablero.forEach((valor, index) => {
                let celda = document.createElement('div');
                celda.className = 'celda';
                celda.innerText = valor;
                celda.onclick = () => procesarClic(index);
                contenedor.appendChild(celda);
            });
        }

        function procesarClic(indice) {
            if (juegoTerminado) return;
            if (modoActual === 'online') hacerMovimientoOnline(indice);
            else hacerMovimientoLocal(indice);
        }

        function reiniciarTablero() {
            juegoTerminado = false;
            recordGuardado = false; 
            if (modoActual === 'online') {
                // AHORA ENVIAMOS EL ID DE LA SALA
                fetch('/api/reiniciar_gato', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sala: salaActual })
                }).then(() => sincronizarOnline());
            } else {
                iniciarJuegoLocal();
            }
        }

        // --- CHAT ONLINE CON SALA ---
        function enviarChat() {
            let input = document.getElementById('input-msj');
            if (input.value.trim() === "") return;
            
            fetch('/api/enviar_chat_gato', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sala: salaActual, jugador: miJugador, mensaje: input.value })
            }).then(() => {
                input.value = "";
                sincronizarOnline();
            });
        }

        function actualizarChat(mensajes) {
            const divMensajes = document.getElementById('mensajes-chat');
            divMensajes.innerHTML = mensajes.join('<br>');
            divMensajes.scrollTop = divMensajes.scrollHeight; 
        }

        // --- LÓGICA ONLINE ---
        function elegirJugador(jugador) {
            miJugador = jugador;
            document.getElementById('btn-x').classList.remove('activo');
            document.getElementById('btn-o').classList.remove('activo');
            if(jugador === '❌') document.getElementById('btn-x').classList.add('activo');
            else document.getElementById('btn-o').classList.add('activo');
            sincronizarOnline(); 
        }

        function sincronizarOnline() {
            if(modoActual !== 'online' || salaActual === '') return;
            
            // AHORA PREGUNTAMOS SOLO POR NUESTRA SALA
            fetch('/api/estado_gato?sala=' + salaActual)
            .then(res => res.json())
            .then(data => {
                if (data.error) return; // Si hay error, no hacemos nada

                if (data.tablero.every(celda => celda === "")) {
                    juegoTerminado = false;
                    recordGuardado = false;
                }

                turnoActual = data.turno;
                actualizarChat(data.chat);
                dibujarTablero(data.tablero);

                if (!checarGanador(data.tablero)) {
                    let msg = document.getElementById('mensaje');
                    if (turnoActual === miJugador) {
                        msg.innerText = "¡Es tu turno! Tira.";
                        msg.style.color = "#00cc66"; 
                    } else {
                        msg.innerText = "Esperando al otro jugador...";
                        msg.style.color = "#ff3385"; 
                    }
                }
            });
        }

        function hacerMovimientoOnline(indice) {
            if (turnoActual !== miJugador) return alert("¡Espera tu turno!");
            fetch('/api/jugar_gato', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // ENVIAMOS EL ID DE LA SALA
                body: JSON.stringify({ sala: salaActual, casilla: indice, jugador: miJugador })
            }).then(() => sincronizarOnline()); 
        }

        // --- LÓGICA LOCAL Y BOT ---
        function iniciarJuegoLocal() {
            tableroLocal = ["", "", "", "", "", "", "", "", ""];
            turnoActual = '❌';
            juegoTerminado = false;
            recordGuardado = false;
            dibujarTablero(tableroLocal);
            document.getElementById('mensaje').innerText = "¡Es tu turno! (❌)";
            document.getElementById('mensaje').style.color = "#00cc66";
        }

        function hacerMovimientoLocal(indice) {
            if (tableroLocal[indice] !== "" || turnoActual !== '❌') return;
            
            tableroLocal[indice] = '❌';
            dibujarTablero(tableroLocal);
            if (checarGanador(tableroLocal)) return;

            turnoActual = '⭕';
            document.getElementById('mensaje').innerText = "El bot está pensando...";
            document.getElementById('mensaje').style.color = "#ff3385";

            setTimeout(() => {
                let movimientoBot = modoActual === 'facil' ? botFacil() : botImposible();
                if (movimientoBot !== -1) tableroLocal[movimientoBot] = '⭕';
                
                dibujarTablero(tableroLocal);
                if (checarGanador(tableroLocal)) return;
                
                turnoActual = '❌';
                document.getElementById('mensaje').innerText = "¡Es tu turno! (❌)";
                document.getElementById('mensaje').style.color = "#00cc66";
            }, 500); 
        }

        function botFacil() {
            let vacias = [];
            for (let i = 0; i < 9; i++) if (tableroLocal[i] === "") vacias.push(i);
            if (vacias.length === 0) return -1;
            return vacias[Math.floor(Math.random() * vacias.length)];
        }

        function botImposible() {
            let mejorPuntaje = -Infinity;
            let movimiento;
            for (let i = 0; i < 9; i++) {
                if (tableroLocal[i] === "") {
                    tableroLocal[i] = "⭕";
                    let puntaje = minimax(tableroLocal, 0, false);
                    tableroLocal[i] = "";
                    if (puntaje > mejorPuntaje) {
                        mejorPuntaje = puntaje;
                        movimiento = i;
                    }
                }
            }
            return movimiento;
        }

        function minimax(tablero, profundidad, esMaximizando) {
            let estado = checarEstadoParaMinimax(tablero);
            if (estado === "⭕") return 10 - profundidad;
            if (estado === "❌") return profundidad - 10;
            if (estado === "empate") return 0;

            if (esMaximizando) {
                let mejorPuntaje = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (tablero[i] === "") {
                        tablero[i] = "⭕";
                        mejorPuntaje = Math.max(mejorPuntaje, minimax(tablero, profundidad + 1, false));
                        tablero[i] = "";
                    }
                }
                return mejorPuntaje;
            } else {
                let mejorPuntaje = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (tablero[i] === "") {
                        tablero[i] = "❌";
                        mejorPuntaje = Math.min(mejorPuntaje, minimax(tablero, profundidad + 1, true));
                        tablero[i] = "";
                    }
                }
                return mejorPuntaje;
            }
        }

        const combinaciones = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];

        function checarGanador(t) {
            for (let c of combinaciones) {
                if (t[c[0]] && t[c[0]] === t[c[1]] && t[c[0]] === t[c[2]]) {
                    juegoTerminado = true;
                    let ganador = t[c[0]];
                    document.getElementById('mensaje').innerText = "¡Ganó " + ganador + "! 🎉";
                    document.getElementById('mensaje').style.color = "#9933ff";
                    
                    if (miJugador === ganador && !recordGuardado) {
                        recordGuardado = true; 
                        setTimeout(() => guardarVictoria(modoActual), 500);
                    }
                    return true;
                }
            }
            if (!t.includes("")) {
                juegoTerminado = true;
                document.getElementById('mensaje').innerText = "¡Es un empate! 🤝";
                document.getElementById('mensaje').style.color = "#666";
                if(modoActual === 'online' && miJugador === '❌' && !recordGuardado) {
                    recordGuardado = true;
                    setTimeout(reiniciarTablero, 2000);
                }
                return true;
            }
            return false;
        }

        function checarEstadoParaMinimax(t) {
            for (let c of combinaciones) {
                if (t[c[0]] && t[c[0]] === t[c[1]] && t[c[0]] === t[c[2]]) return t[c[0]];
            }
            if (!t.includes("")) return "empate";
            return null;
        }

        function guardarVictoria(modo) {
            let nombreModo = modo === 'facil' ? 'Bot Fácil' : (modo === 'imposible' ? 'Bot Imposible' : 'En Línea');
            let n = prompt("¡Victoria Épica!\nLograste ganar en el modo: " + nombreModo + ".\nIngresa tu nombre para guardar en Récords:");
            
            if (n) {
                // Aquí el juego decide a qué lista mandarlo:
                let ruta_guardado = (modo === 'online') ? '/guardar_victoria_online' : '/guardar_victoria';

                fetch(ruta_guardado, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre: n, puntos: 1 })
                }).then(() => {
                    alert("¡Récord guardado! Revisa el menú secreto.");
                    reiniciarTablero(); 
                });
            } else {
                reiniciarTablero(); 
            }
        }
    </script>
</body>
</html>
