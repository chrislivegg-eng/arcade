<!doctype html>
<html lang="es">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <meta charset="UTF-8" />
    <title>Viborita Kawaii</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Nunito", sans-serif;
        background: linear-gradient(135deg, #e6ffec 0%, #b3ffcc 100%);
        margin: 0;
        padding: 20px;
        text-align: center;
        color: #33cc66;
      }

      #game-container {
        display: inline-block;
        background: white;
        padding: 20px;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 204, 102, 0.2);
        border: 4px dashed #66ff99;
      }

      canvas {
        background: #f0fff4;
        border: 2px solid #99ffbb;
        border-radius: 15px;
        box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.05);
      }

      .hud {
        font-size: 2em;
        font-weight: 900;
        margin-bottom: 15px;
        color: #00b359;
      }

      .btn-juego {
        background: linear-gradient(45deg, #33cc66, #00994d);
        color: white;
        border: none;
        padding: 12px 30px;
        font-size: 1.2em;
        border-radius: 50px;
        cursor: pointer;
        font-weight: bold;
        margin: 10px;
        box-shadow: 0 5px 15px rgba(51, 204, 102, 0.4);
        text-decoration: none;
        display: inline-block;
      }

      .btn-juego:hover {
        transform: scale(1.05);
      }

      #overlay {
        display: none;
        position: fixed;
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 30px;
        border: 4px dashed #ff99cc;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <div id="game-container">
      <h1 style="margin-top: 0">🐍 Viborita Kawaii 🍓</h1>
      <div class="hud">Largo: <span id="score">0</span></div>
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div
        class="controles-movil"
        style="flex-direction: column; align-items: center; gap: 5px"
      >
        <div
          class="btn-control"
          onmousedown="
            if (dy !== 20) {
              dx = 0;
              dy = -20;
              changingDirection = true;
            }
          "
          ontouchstart="if(dy!==20){dx=0; dy=-20; changingDirection=true;}; event.preventDefault()"
        >
          ⬆️
        </div>
        <div style="display: flex; gap: 40px">
          <div
            class="btn-control"
            onmousedown="
              if (dx !== 20) {
                dx = -20;
                dy = 0;
                changingDirection = true;
              }
            "
            ontouchstart="if(dx!==20){dx=-20; dy=0; changingDirection=true;}; event.preventDefault()"
          >
            ⬅️
          </div>
          <div
            class="btn-control"
            onmousedown="
              if (dx !== -20) {
                dx = 20;
                dy = 0;
                changingDirection = true;
              }
            "
            ontouchstart="if(dx!==-20){dx=20; dy=0; changingDirection=true;}; event.preventDefault()"
          >
            ➡️
          </div>
        </div>
        <div
          class="btn-control"
          onmousedown="
            if (dy !== -20) {
              dx = 0;
              dy = 20;
              changingDirection = true;
            }
          "
          ontouchstart="if(dy!==-20){dx=0; dy=20; changingDirection=true;}; event.preventDefault()"
        >
          ⬇️
        </div>
      </div>
      <br />
      <button class="btn-juego" onclick="iniciarJuego()">▶️ Jugar</button>
      <a
        href="/secreto"
        class="btn-juego"
        style="background: #fff; color: #00b359; border: 2px solid #00b359"
        >🏠 Menú</a
      >
    </div>

    <div id="overlay">
      <h2 style="color: #ff3385; font-size: 2.5em; margin: 0">
        ¡Ayñ, chocaste! 💥
      </h2>
      <p style="font-size: 1.5em; color: #666">
        Tu viborita comió <b id="final-score"></b> fresitas.
      </p>
      <button class="btn-juego" style="background: #ff3385" onclick="guardar()">
        💾 Guardar Récord
      </button>
      <button class="btn-juego" onclick="location.reload()">
        🔄 Reintentar
      </button>
    </div>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const gridSize = 20;

      let snake = [];
      let dx = gridSize;
      let dy = 0;
      let foodX;
      let foodY;
      let score = 0;
      let gameActivo = false;
      let gameLoop;
      let changingDirection = false;

      function iniciarJuego() {
        if (gameActivo) return;
        snake = [
          {
            x: 200,
            y: 200,
          },
          {
            x: 180,
            y: 200,
          },
          {
            x: 160,
            y: 200,
          },
        ];
        dx = gridSize;
        dy = 0;
        score = 0;
        document.getElementById("score").innerText = score;
        document.getElementById("overlay").style.display = "none";
        generarComida();
        gameActivo = true;
        gameLoop = setInterval(main, 120); // Velocidad
      }

      function main() {
        if (hasGameEnded()) {
          clearInterval(gameLoop);
          gameActivo = false;
          document.getElementById("final-score").innerText = score;
          document.getElementById("overlay").style.display = "block";
          return;
        }
        changingDirection = false;
        clearCanvas();
        drawFood();
        advanceSnake();
        drawSnake();
      }

      function clearCanvas() {
        ctx.fillStyle = "#f0fff4";
        ctx.strokeStyle = "#ccffdd";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeRect(0, 0, canvas.width, canvas.height);
      }

      function drawSnake() {
        snake.forEach((part, index) => {
          ctx.fillStyle = index === 0 ? "#ff66a3" : "#ff99cc"; // Cabeza más oscura
          ctx.strokeStyle = "#fff";
          ctx.fillRect(part.x, part.y, gridSize, gridSize);
          ctx.strokeRect(part.x, part.y, gridSize, gridSize);
        });
      }

      function advanceSnake() {
        const head = {
          x: snake[0].x + dx,
          y: snake[0].y + dy,
        };
        snake.unshift(head);
        const ateFood = snake[0].x === foodX && snake[0].y === foodY;
        if (ateFood) {
          score++;
          document.getElementById("score").innerText = score;
          generarComida();
        } else {
          snake.pop();
        }
      }

      function generarComida() {
        foodX =
          Math.round((Math.random() * (canvas.width - gridSize)) / gridSize) *
          gridSize;
        foodY =
          Math.round((Math.random() * (canvas.height - gridSize)) / gridSize) *
          gridSize;
        snake.forEach((part) => {
          if (part.x == foodX && part.y == foodY) generarComida();
        });
      }

      function drawFood() {
        ctx.font = "18px Arial";
        ctx.fillText("🍓", foodX, foodY + 16);
      }

      function hasGameEnded() {
        for (let i = 4; i < snake.length; i++) {
          if (snake[i].x === snake[0].x && snake[i].y === snake[0].y)
            return true;
        }
        const hitLeftWall = snake[0].x < 0;
        const hitRightWall = snake[0].x >= canvas.width;
        const hitToptWall = snake[0].y < 0;
        const hitBottomWall = snake[0].y >= canvas.height;
        return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
      }

      document.addEventListener("keydown", changeDirection);

      function changeDirection(event) {
        const LEFT_KEY = 37,
          RIGHT_KEY = 39,
          UP_KEY = 38,
          DOWN_KEY = 40;
        if (changingDirection) return;
        const keyPressed = event.keyCode;
        const goingUp = dy === -gridSize;
        const goingDown = dy === gridSize;
        const goingRight = dx === gridSize;
        const goingLeft = dx === -gridSize;

        if (keyPressed === LEFT_KEY && !goingRight) {
          dx = -gridSize;
          dy = 0;
          changingDirection = true;
          event.preventDefault();
        }
        if (keyPressed === UP_KEY && !goingDown) {
          dx = 0;
          dy = -gridSize;
          changingDirection = true;
          event.preventDefault();
        }
        if (keyPressed === RIGHT_KEY && !goingLeft) {
          dx = gridSize;
          dy = 0;
          changingDirection = true;
          event.preventDefault();
        }
        if (keyPressed === DOWN_KEY && !goingUp) {
          dx = 0;
          dy = gridSize;
          changingDirection = true;
          event.preventDefault();
        }
      }

      function guardar() {
        let nombre = prompt("Nombre para la tabla de líderes:");
        if (nombre) {
          fetch("/guardar_vibora", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              nombre: nombre,
              puntos: score,
            }),
          }).then(() => (window.location.href = "/secreto"));
        }
      }
    </script>
  </body>
</html>
