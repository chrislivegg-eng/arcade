<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Memorama Online Kawaii</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <style>
      body {
        text-align: center;
        padding: 10px;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      .memorama-tablero {
        display: grid;
        grid-template-columns: repeat(4, 80px);
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
        perspective: 1000px;
      }

      .carta {
        width: 80px;
        height: 80px;
        background: #ff99cc;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.5em;
        color: transparent;
        transition:
          transform 0.3s,
          background 0.3s;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        user-select: none;
      }

      .carta.volteada {
        background: white;
        color: black;
        transform: rotateY(180deg);
        border: 2px solid #ff99cc;
      }

      .carta.encontrada {
        background: #ffe4e9;
        color: black;
        cursor: default;
        border: 2px solid #ff3385;
      }

      /* Estilos específicos para las salas online */
      .lobby-box {
        background: white;
        padding: 30px;
        border-radius: 20px;
        border: 3px dashed #ff99cc;
        max-width: 400px;
        margin: 40px auto;
      }

      .input-sala {
        padding: 12px;
        border-radius: 10px;
        border: 2px solid #ff99cc;
        font-size: 1.2em;
        text-align: center;
        width: 80%;
        margin-bottom: 15px;
      }

      .marcador {
        display: flex;
        justify-content: space-around;
        background: #fff0f5;
        padding: 10px;
        border-radius: 10px;
        margin-top: 15px;
        font-weight: bold;
        font-size: 1.2em;
        border: 2px solid #ff99cc;
      }

      @media (max-width: 440px) {
        .memorama-tablero {
          grid-template-columns: repeat(4, 20vw);
          gap: 2vw;
        }
        .carta {
          width: 20vw;
          height: 20vw;
          font-size: 9vw;
          border-radius: 8px;
        }
      }
    </style>
  </head>

  <body>
    <h2>💖 Memorama Online 💖</h2>

    <div id="pantalla-lobby" class="lobby-box">
      <h3>🎮 Jugar con un amigo</h3>
      <button
        class="btn"
        onclick="crearSala()"
        style="width: 100%; margin-bottom: 20px"
      >
        Crear Nueva Sala
      </button>

      <hr style="border: 1px solid #ffe6f2; margin: 20px 0" />

      <h3>Unirse a una sala</h3>
      <input
        type="text"
        id="codigo-sala"
        class="input-sala"
        placeholder="CÓDIGO (Ej. X7Y2)"
      />
      <button class="btn" onclick="unirseSala()" style="width: 100%">
        Unirse
      </button>

      <br /><br />
      <a
        href="/secreto"
        style="color: #ff3385; font-weight: bold; text-decoration: none"
        >Volver al menú</a
      >
    </div>

    <div id="pantalla-juego" style="display: none">
      <h3 style="color: #ff3385; margin-bottom: 5px">
        Sala: <span id="display-sala"></span> | Eres el JUGADOR
        <span id="display-jugador"></span>
      </h3>
      <h4 id="display-turno" style="color: #cc0066; margin-top: 0">
        Cargando turno...
      </h4>

      <div class="marcador">
        <span style="color: #0099ff">J1: <span id="pts-1">0</span> pares</span>
        <span style="color: #ff9900">J2: <span id="pts-2">0</span> pares</span>
      </div>

      <div class="memorama-tablero" id="tablero-online"></div>

      <br />
      <a
        href="/secreto"
        class="btn"
        style="background: #ccc; border-color: #999"
        >Salir de la sala</a
      >
    </div>

    <script>
      let miSala = "";
      let miJugador = 0;
      let intervalo = null;

      function crearSala() {
        // Genera un código aleatorio de 4 letras/números
        miSala = Math.random().toString(36).substring(2, 6).toUpperCase();
        miJugador = 1;
        iniciarJuego();
      }

      function unirseSala() {
        let cod = document.getElementById("codigo-sala").value.toUpperCase();
        if (cod.length < 4) return alert("Ingresa un código válido");
        miSala = cod;
        miJugador = 2;
        iniciarJuego();
      }

      function iniciarJuego() {
        document.getElementById("pantalla-lobby").style.display = "none";
        document.getElementById("pantalla-juego").style.display = "block";
        document.getElementById("display-sala").innerText = miSala;
        document.getElementById("display-jugador").innerText = miJugador;

        // El celular le pregunta a Python cada 1 segundo cómo va el juego
        intervalo = setInterval(obtenerEstado, 1000);
        obtenerEstado();
      }

      function obtenerEstado() {
        fetch(`/api/estado_memorama/${miSala}`)
          .then((r) => r.json())
          .then((estado) => {
            // Actualizar textos de turnos y puntos
            let textoTurno =
              estado.turno === miJugador
                ? "¡ES TU TURNO! ✅"
                : "Esperando al rival... ⏳";
            document.getElementById("display-turno").innerText = textoTurno;
            document.getElementById("pts-1").innerText = estado.puntos_1;
            document.getElementById("pts-2").innerText = estado.puntos_2;

            // Dibujar las cartas
            renderizarTablero(estado);

            // LOGICA MAESTRA: Si volteaste 2 cartas, te damos 1.5 segundos para que ambos
            // las vean, y luego mandamos a Python a verificar si ganaste o fallaste.
            if (
              estado.cartas_seleccionadas.length === 2 &&
              estado.turno === miJugador
            ) {
              setTimeout(() => {
                fetch("/api/verificar_memorama", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ sala: miSala }),
                }).then(() => obtenerEstado());
              }, 1500);
            }

            // Comprobar si ya se acabaron las cartas (8 pares en total)
            if (estado.puntos_1 + estado.puntos_2 === 8) {
              clearInterval(intervalo);
              let ganador =
                estado.puntos_1 > estado.puntos_2
                  ? 1
                  : estado.puntos_2 > estado.puntos_1
                    ? 2
                    : "Empate";
              if (ganador === "Empate") alert("¡Fue un empate!");
              else
                alert(
                  ganador === miJugador
                    ? "¡FELICIDADES, GANASTE! 🎉"
                    : "Perdiste... 😿",
                );
            }
          });
      }

      function renderizarTablero(estado) {
        const tablero = document.getElementById("tablero-online");
        tablero.innerHTML = "";

        for (let i = 0; i < 16; i++) {
          let div = document.createElement("div");
          div.className = "carta";

          if (estado.visibles[i] || estado.resueltas[i]) {
            div.classList.add("volteada");
            div.innerText = estado.cartas[i];
            if (estado.resueltas[i]) div.classList.add("encontrada");
          }

          div.onclick = () => voltearCarta(i, estado);
          tablero.appendChild(div);
        }
      }

      function voltearCarta(idx, estado) {
        if (estado.turno !== miJugador) return alert("¡No es tu turno!");
        if (estado.cartas_seleccionadas.length >= 2) return;
        if (estado.visibles[idx] || estado.resueltas[idx]) return;

        // Enviar el clic a Python
        fetch("/api/jugar_memorama", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sala: miSala, jugador: miJugador, idx: idx }),
        }).then(() => obtenerEstado()); // Refresca rápido para ver la carta
      }
    </script>
  </body>
</html>
