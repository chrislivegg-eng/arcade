<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>💖 Memorama Online</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Nunito", sans-serif;
        background: linear-gradient(135deg, #ffe6f0, #ffd9e6, #ffe6f5);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        border-radius: 40px;
        padding: 30px 25px;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(255, 51, 133, 0.2);
        border: 3px solid rgba(255, 153, 204, 0.3);
        text-align: center;
      }

      h1 {
        font-size: 2.2rem;
        color: #ff3385;
        text-shadow: 3px 3px 0 #ffb3d9;
        margin-bottom: 5px;
      }

      .subtitle {
        color: #ff6b9d;
        font-size: 0.9rem;
        margin-bottom: 15px;
      }

      .lobby-box {
        background: #fff5f9;
        padding: 25px;
        border-radius: 25px;
        border: 3px dashed #ff99cc;
        margin: 15px 0;
      }

      .lobby-box h3 {
        color: #ff3385;
        margin-bottom: 15px;
      }

      .lobby-box hr {
        border: 1px solid #ffe6f2;
        margin: 20px 0;
      }

      .btn {
        padding: 14px 28px;
        border: none;
        border-radius: 50px;
        font-family: "Nunito", sans-serif;
        font-weight: 900;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-decoration: none;
        color: white;
        width: 100%;
        margin-bottom: 10px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #ff6b9d, #ff3385);
        box-shadow: 0 6px 20px rgba(255, 51, 133, 0.35);
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(255, 51, 133, 0.45);
      }

      .btn-purple {
        background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        box-shadow: 0 6px 20px rgba(108, 92, 231, 0.35);
      }

      .btn-purple:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(108, 92, 231, 0.45);
      }

      .btn-green {
        background: linear-gradient(135deg, #00b894, #55efc4);
        color: white;
        box-shadow: 0 6px 20px rgba(0, 184, 148, 0.35);
      }

      .btn-green:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 184, 148, 0.45);
      }

      .input-sala {
        padding: 14px 20px;
        border-radius: 15px;
        border: 2px solid #ff99cc;
        font-size: 1.1rem;
        text-align: center;
        width: 80%;
        margin-bottom: 15px;
        font-family: "Nunito", sans-serif;
        outline: none;
        transition: border-color 0.3s;
      }

      .input-sala:focus {
        border-color: #ff3385;
      }

      .game-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        background: #fff5f9;
        padding: 12px 20px;
        border-radius: 20px;
        border: 2px solid #ff99cc;
        margin-bottom: 15px;
      }

      .game-header .room-info {
        font-weight: 900;
        color: #ff3385;
        font-size: 1rem;
      }

      .game-header .player-info {
        background: #ff3385;
        color: white;
        padding: 4px 16px;
        border-radius: 30px;
        font-weight: 900;
        font-size: 0.9rem;
      }

      .turn-indicator {
        font-size: 1.2rem;
        color: #4a2a3a;
        padding: 10px;
        background: white;
        border-radius: 15px;
        border: 2px solid #ffccdd;
        margin-bottom: 15px;
        min-height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .marcador {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin: 15px 0;
        max-width: 300px;
        margin-left: auto;
        margin-right: auto;
      }

      .stat-card {
        background: white;
        border-radius: 20px;
        padding: 12px;
        border: 2px solid #ffccdd;
        text-align: center;
      }

      .stat-card .stat-number {
        font-size: 1.8rem;
        font-weight: 900;
        color: #ff3385;
      }

      .stat-card .stat-label {
        font-size: 0.7rem;
        color: #cc99aa;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .stat-card.player1 .stat-number {
        color: #0099ff;
      }

      .stat-card.player2 .stat-number {
        color: #ff9900;
      }

      .memorama-tablero {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        max-width: 400px;
        margin: 20px auto;
        perspective: 1000px;
      }

      .carta {
        aspect-ratio: 1;
        background: linear-gradient(135deg, #ff99cc, #ff66a3);
        border-radius: 16px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.8rem;
        color: transparent;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 6px 20px rgba(255, 51, 133, 0.15);
        user-select: none;
        border: 3px solid rgba(255, 255, 255, 0.3);
        min-height: 70px;
        transform-style: preserve-3d;
      }

      .carta.volteada {
        background: white;
        color: #4a2a3a;
        transform: rotateY(180deg);
        border: 3px solid #ff99cc;
        box-shadow: 0 6px 25px rgba(255, 51, 133, 0.25);
      }

      .carta.encontrada {
        background: #ffe4e9;
        color: #4a2a3a;
        cursor: default;
        border: 3px solid #ff3385;
        transform: rotateY(180deg) scale(0.95);
        box-shadow: 0 4px 15px rgba(255, 51, 133, 0.15);
      }

      .carta:hover:not(.volteada):not(.encontrada) {
        transform: scale(1.08);
        box-shadow: 0 8px 30px rgba(255, 51, 133, 0.3);
      }

      .back-link {
        display: inline-block;
        margin-top: 15px;
        color: #ff3385;
        font-weight: 900;
        text-decoration: none;
        padding: 8px 20px;
        border-radius: 30px;
        border: 2px solid #ff3385;
        transition: all 0.3s ease;
        font-size: 0.9rem;
      }

      .back-link:hover {
        background: #ff3385;
        color: white;
      }

      @media (max-width: 500px) {
        .container {
          padding: 15px 12px;
        }

        h1 {
          font-size: 1.6rem;
        }

        .memorama-tablero {
          gap: 6px;
          max-width: 320px;
        }

        .carta {
          font-size: 2rem;
          min-height: 60px;
          border-radius: 12px;
        }

        .game-header {
          flex-direction: column;
          align-items: center;
        }
      }

      @media (max-width: 380px) {
        .memorama-tablero {
          gap: 4px;
          max-width: 280px;
        }

        .carta {
          font-size: 1.6rem;
          min-height: 50px;
          border-radius: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>💖 Memorama Online</h1>
      <p class="subtitle">🎮 Encuentra las parejas antes que tu rival</p>

      <!-- LOBBY -->
      <div id="pantalla-lobby" class="lobby-box">
        <h3>🎮 Jugar Online con un amigo</h3>
        <button class="btn btn-primary" onclick="crearSala()">
          ✨ Crear Nueva Sala
        </button>

        <input
          type="text"
          id="codigo-sala"
          class="input-sala"
          placeholder="📝 CÓDIGO (Ej. X7Y2)"
          maxlength="6"
        />
        <button class="btn btn-purple" onclick="unirseSala()">
          🚀 Unirse a Sala
        </button>

        <br />
        <a href="/secreto" class="back-link">🏠 Volver al Menú</a>
      </div>

      <!-- JUEGO -->
      <div id="pantalla-juego" style="display: none">
        <div class="game-header">
          <span class="room-info"
            >🏠 Sala: <span id="display-sala"></span
          ></span>
          <span class="player-info"
            >Jugador <span id="display-jugador"></span
          ></span>
        </div>

        <div class="turn-indicator" id="turnIndicator">
          <span id="display-turno">Cargando...</span>
        </div>

        <div class="marcador">
          <div class="stat-card player1">
            <div class="stat-number" id="pts-1">0</div>
            <div class="stat-label">🎀 Jugador 1</div>
          </div>
          <div class="stat-card player2">
            <div class="stat-number" id="pts-2">0</div>
            <div class="stat-label">🌟 Jugador 2</div>
          </div>
        </div>

        <div class="memorama-tablero" id="tablero"></div>

        <div
          style="
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
          "
        >
          <button
            class="btn btn-green"
            onclick="reiniciarJuego()"
            style="width: auto; padding: 10px 20px; font-size: 0.9rem"
          >
            🔄 Nueva Partida
          </button>
          <button
            class="btn btn-primary"
            onclick="salirJuego()"
            style="
              width: auto;
              padding: 10px 20px;
              font-size: 0.9rem;
              background: #ccc;
              box-shadow: none;
            "
          >
            🚪 Salir
          </button>
        </div>
      </div>
    </div>

    <script>
      // ============================================================
      //  CONFIGURACIÓN
      // ============================================================
      let miSala = "";
      let miJugador = 1;
      let intervalo = null;
      let juegoActivo = false;
      let procesando = false;

      // ============================================================
      //  FUNCIONES DE SALA
      // ============================================================
      function crearSala() {
        fetch("/api/crear_sala_memorama", { method: "POST" })
          .then((r) => r.json())
          .then((data) => {
            miSala = data.sala;
            miJugador = 1;
            arrancarJuego();
          });
      }

      function unirseSala() {
        const cod = document.getElementById("codigo-sala").value.toUpperCase();
        if (cod.length < 4) {
          alert("⚠️ Ingresa un código válido de 4 caracteres");
          return;
        }
        miSala = cod;
        miJugador = 2;
        arrancarJuego();
      }

      function arrancarJuego() {
        document.getElementById("pantalla-lobby").style.display = "none";
        document.getElementById("pantalla-juego").style.display = "block";
        document.getElementById("display-sala").textContent = miSala;
        document.getElementById("display-jugador").textContent = miJugador;
        juegoActivo = true;

        if (intervalo) clearInterval(intervalo);
        intervalo = setInterval(obtenerEstado, 800);
        obtenerEstado();
      }

      // ============================================================
      //  OBTENER ESTADO
      // ============================================================
      function obtenerEstado() {
        if (!juegoActivo) return;

        fetch(`/api/estado_memorama/${miSala}`)
          .then((r) => r.json())
          .then((estado) => {
            // Actualizar turno
            const esMiTurno = estado.turno === miJugador;
            const turnoText = esMiTurno
              ? "🎀 ¡ES TU TURNO!"
              : "⏳ Esperando al rival...";
            document.getElementById("display-turno").textContent = turnoText;

            // Actualizar puntuaciones
            document.getElementById("pts-1").textContent = estado.puntos_1;
            document.getElementById("pts-2").textContent = estado.puntos_2;

            // Renderizar tablero
            renderizarTablero(estado);

            // Verificar fin del juego
            const totalPares = 8;
            if (estado.puntos_1 + estado.puntos_2 === totalPares) {
              clearInterval(intervalo);
              juegoActivo = false;
              const ganador =
                estado.puntos_1 > estado.puntos_2
                  ? 1
                  : estado.puntos_2 > estado.puntos_1
                    ? 2
                    : 0;
              setTimeout(() => {
                let mensaje =
                  ganador === 0
                    ? "🤝 ¡Empate!"
                    : ganador === miJugador
                      ? "🎉 ¡GANASTE!"
                      : "😅 Perdiste...";
                alert(
                  mensaje + `\nJ1: ${estado.puntos_1} | J2: ${estado.puntos_2}`,
                );
                guardarVictoria(ganador);
              }, 500);
            }
          })
          .catch(() => {});
      }

      // ============================================================
      //  RENDERIZAR TABLERO
      // ============================================================
      function renderizarTablero(estado) {
        const tablero = document.getElementById("tablero");
        tablero.innerHTML = "";

        for (let i = 0; i < 16; i++) {
          const div = document.createElement("div");
          div.className = "carta";

          if (estado.visibles[i] || estado.resueltas[i]) {
            div.classList.add("volteada");
            div.textContent = estado.cartas[i];
            if (estado.resueltas[i]) {
              div.classList.add("encontrada");
            }
          }

          // Solo permitir clic si es tu turno y la carta no está visible/resuelta
          if (
            estado.turno === miJugador &&
            !estado.visibles[i] &&
            !estado.resueltas[i] &&
            !procesando
          ) {
            div.onclick = () => jugarCarta(i);
            div.style.cursor = "pointer";
          } else {
            div.style.cursor = "default";
          }

          tablero.appendChild(div);
        }
      }

      // ============================================================
      //  JUGAR CARTA
      // ============================================================
      function jugarCarta(idx) {
        if (procesando) return;
        if (!juegoActivo) return;

        procesando = true;

        fetch("/api/jugar_memorama", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sala: miSala,
            jugador: miJugador,
            idx: idx,
          }),
        })
          .then((r) => r.json())
          .then((estado) => {
            procesando = false;
            // Actualizar estado inmediatamente
            renderizarTablero(estado);
          })
          .catch(() => {
            procesando = false;
          });
      }

      // ============================================================
      //  REINICIAR JUEGO
      // ============================================================
      function reiniciarJuego() {
        if (!miSala) return;

        fetch("/api/reiniciar_memorama", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sala: miSala }),
        }).then(() => {
          if (intervalo) clearInterval(intervalo);
          intervalo = setInterval(obtenerEstado, 800);
          obtenerEstado();
        });
      }

      // ============================================================
      //  GUARDAR VICTORIA
      // ============================================================
      function guardarVictoria(ganador) {
        if (ganador === 0) return;
        const nombre = prompt("✨ Ingresa tu nombre para el récord:");
        if (nombre && nombre.trim()) {
          fetch("/guardar_memorama_online", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre: nombre.trim() }),
          }).catch(() => {});
        }
      }

      // ============================================================
      //  SALIR
      // ============================================================
      function salirJuego() {
        if (intervalo) {
          clearInterval(intervalo);
          intervalo = null;
        }
        juegoActivo = false;
        document.getElementById("pantalla-juego").style.display = "none";
        document.getElementById("pantalla-lobby").style.display = "block";
      }
    </script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
  </body>
</html>
