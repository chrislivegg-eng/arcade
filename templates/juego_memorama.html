<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Memorama Multijugador Kawaii</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <style>
      body {
        text-align: center;
        padding: 10px;
        box-sizing: border-box;
        overflow-x: hidden;
      }

      .memorama-tablero {
        display: grid;
        grid-template-columns: repeat(4, 80px);
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
        perspective: 1000px;
      }

      .carta {
        width: 80px;
        height: 80px;
        background: #ff99cc;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.5em;
        color: transparent;
        transition:
          transform 0.3s,
          background 0.3s;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        user-select: none;
      }

      .carta.volteada {
        background: white;
        color: black;
        transform: rotateY(180deg);
        border: 2px solid #ff99cc;
      }

      .carta.encontrada {
        background: #ffe4e9;
        color: black;
        cursor: default;
        border: 2px solid #ff3385;
      }

      .lobby-box {
        background: white;
        padding: 30px;
        border-radius: 20px;
        border: 3px dashed #ff99cc;
        max-width: 400px;
        margin: 40px auto;
      }

      .input-sala {
        padding: 12px;
        border-radius: 10px;
        border: 2px solid #ff99cc;
        font-size: 1.2em;
        text-align: center;
        width: 80%;
        margin-bottom: 15px;
      }

      .marcador {
        display: flex;
        justify-content: space-around;
        background: #fff0f5;
        padding: 10px;
        border-radius: 10px;
        margin-top: 15px;
        font-weight: bold;
        font-size: 1.2em;
        border: 2px solid #ff99cc;
      }

      @media (max-width: 440px) {
        .memorama-tablero {
          grid-template-columns: repeat(4, 20vw);
          gap: 2vw;
        }
        .carta {
          width: 20vw;
          height: 20vw;
          font-size: 9vw;
          border-radius: 8px;
        }
      }
    </style>
  </head>

  <body>
    <h2>💖 Memorama VS 💖</h2>

    <div id="pantalla-lobby" class="lobby-box">
      <h3>🤖 Jugar Solo</h3>
      <button
        class="btn"
        onclick="iniciarJuegoBot()"
        style="width: 100%; background: #ff66a3"
      >
        Jugar contra la PC (Bot)
      </button>

      <hr style="border: 1px solid #ffe6f2; margin: 25px 0" />

      <h3>🎮 Jugar Online con un amigo</h3>
      <button
        class="btn"
        onclick="crearSalaOnline()"
        style="width: 100%; margin-bottom: 20px"
      >
        Crear Nueva Sala
      </button>

      <input
        type="text"
        id="codigo-sala"
        class="input-sala"
        placeholder="CÓDIGO (Ej. X7Y2)"
      />
      <button class="btn" onclick="unirseSalaOnline()" style="width: 100%">
        Unirse a Sala
      </button>

      <br /><br />
      <a
        href="/secreto"
        style="color: #ff3385; font-weight: bold; text-decoration: none"
        >Volver al menú</a
      >
    </div>

    <div id="pantalla-juego" style="display: none">
      <h3 style="color: #ff3385; margin-bottom: 5px">
        Sala: <span id="display-sala"></span> | JUGADOR
        <span id="display-jugador"></span>
      </h3>
      <h4 id="display-turno" style="color: #cc0066; margin-top: 0">
        Cargando turno...
      </h4>

      <div class="marcador">
        <span style="color: #0099ff">J1: <span id="pts-1">0</span> pares</span>
        <span style="color: #ff9900">J2: <span id="pts-2">0</span> pares</span>
      </div>

      <div class="memorama-tablero" id="tablero-online"></div>

      <br />
      <a
        href="/secreto"
        class="btn"
        style="background: #ccc; border-color: #999"
        >Salir del juego</a
      >
    </div>

    <script>
      let modoJuego = ""; // Puede ser "online" o "bot"
      let miSala = "";
      let miJugador = 1;
      let intervalo = null;

      // =========================================================
      // --- LÓGICA DEL MODO BOT (COMPUTADORA) ---
      // =========================================================
      let estadoLocal = null;

      function iniciarJuegoBot() {
        modoJuego = "bot";
        miJugador = 1;
        document.getElementById("pantalla-lobby").style.display = "none";
        document.getElementById("pantalla-juego").style.display = "block";
        document.getElementById("display-sala").innerText = "VS BOT 🤖";
        document.getElementById("display-jugador").innerText = "1 (Tú)";

        // Preparamos las cartas revueltas para jugar localmente
        const emojis = ["🎀", "🐱", "🌸", "🍓", "💖", "🍰", "🍎", "⭐"];
        let cartas = [...emojis, ...emojis];
        cartas.sort(() => Math.random() - 0.5);

        // Creamos un estado "falso" idéntico al que nos mandaría Python
        estadoLocal = {
          cartas: cartas,
          visibles: Array(16).fill(false),
          resueltas: Array(16).fill(false),
          turno: 1,
          puntos_1: 0,
          puntos_2: 0,
          cartas_seleccionadas: [],
        };
        actualizarPantallaBot();
      }

      function actualizarPantallaBot() {
        let textoTurno =
          estadoLocal.turno === 1 ? "¡ES TU TURNO! ✅" : "Turno del BOT... 🤖";
        document.getElementById("display-turno").innerText = textoTurno;
        document.getElementById("pts-1").innerText = estadoLocal.puntos_1;
        document.getElementById("pts-2").innerText = estadoLocal.puntos_2;
        renderizarTablero(estadoLocal);

        // Revisar si alguien ganó
        if (estadoLocal.puntos_1 + estadoLocal.puntos_2 === 8) {
          setTimeout(() => {
            let ganador =
              estadoLocal.puntos_1 > estadoLocal.puntos_2
                ? 1
                : estadoLocal.puntos_2 > estadoLocal.puntos_1
                  ? 2
                  : "Empate";
            if (ganador === "Empate") alert("¡Fue un empate contra el Bot!");
            else
              alert(
                ganador === 1
                  ? "¡FELICIDADES, LE GANASTE AL BOT! 🎉"
                  : "El Bot te ganó... 😿",
              );
          }, 500);
        } else if (
          estadoLocal.turno === 2 &&
          estadoLocal.cartas_seleccionadas.length === 0
        ) {
          // Si es turno del Bot, hacerlo jugar después de 1 segundo
          setTimeout(juegaBot, 1000);
        }
      }

      function voltearCartaLocal(idx) {
        if (estadoLocal.turno !== 1) return; // Si no es tu turno, ignorar clic
        if (estadoLocal.cartas_seleccionadas.length >= 2) return;
        if (estadoLocal.visibles[idx] || estadoLocal.resueltas[idx]) return;

        estadoLocal.visibles[idx] = true;
        estadoLocal.cartas_seleccionadas.push(idx);
        actualizarPantallaBot();

        if (estadoLocal.cartas_seleccionadas.length === 2)
          setTimeout(verificarParLocal, 1000);
      }

      function verificarParLocal() {
        let i1 = estadoLocal.cartas_seleccionadas[0];
        let i2 = estadoLocal.cartas_seleccionadas[1];

        if (estadoLocal.cartas[i1] === estadoLocal.cartas[i2]) {
          estadoLocal.resueltas[i1] = estadoLocal.resueltas[i2] = true;
          if (estadoLocal.turno === 1) estadoLocal.puntos_1++;
          else estadoLocal.puntos_2++;
        } else {
          estadoLocal.visibles[i1] = estadoLocal.visibles[i2] = false;
          estadoLocal.turno = estadoLocal.turno === 1 ? 2 : 1;
        }
        estadoLocal.cartas_seleccionadas = [];
        actualizarPantallaBot();
      }

      function juegaBot() {
        // El Bot busca qué cartas están boca abajo
        let disponibles = [];
        for (let i = 0; i < 16; i++) {
          if (!estadoLocal.resueltas[i] && !estadoLocal.visibles[i])
            disponibles.push(i);
        }
        if (disponibles.length < 2) return;

        // El Bot elige 2 al azar
        disponibles.sort(() => Math.random() - 0.5);
        let c1 = disponibles[0];
        let c2 = disponibles[1];

        // Voltea la primera carta
        estadoLocal.visibles[c1] = true;
        estadoLocal.cartas_seleccionadas.push(c1);
        actualizarPantallaBot();

        // Medio segundo después, voltea la segunda carta
        setTimeout(() => {
          estadoLocal.visibles[c2] = true;
          estadoLocal.cartas_seleccionadas.push(c2);
          actualizarPantallaBot();
          // Espera un segundo más para que veas qué volteó, y luego verifica
          setTimeout(verificarParLocal, 1000);
        }, 600);
      }

      // =========================================================
      // --- LÓGICA DEL MODO ONLINE (CON PYTHON) ---
      // =========================================================
      function crearSalaOnline() {
        modoJuego = "online";
        miSala = Math.random().toString(36).substring(2, 6).toUpperCase();
        miJugador = 1;
        arrancarOnline();
      }

      function unirseSalaOnline() {
        let cod = document.getElementById("codigo-sala").value.toUpperCase();
        if (cod.length < 4) return alert("Ingresa un código válido");
        modoJuego = "online";
        miSala = cod;
        miJugador = 2;
        arrancarOnline();
      }

      function arrancarOnline() {
        document.getElementById("pantalla-lobby").style.display = "none";
        document.getElementById("pantalla-juego").style.display = "block";
        document.getElementById("display-sala").innerText = miSala;
        document.getElementById("display-jugador").innerText = miJugador;

        intervalo = setInterval(obtenerEstadoOnline, 1000);
        obtenerEstadoOnline();
      }

      function obtenerEstadoOnline() {
        fetch(`/api/estado_memorama/${miSala}`)
          .then((r) => r.json())
          .then((estado) => {
            let textoTurno =
              estado.turno === miJugador
                ? "¡ES TU TURNO! ✅"
                : "Esperando al rival... ⏳";
            document.getElementById("display-turno").innerText = textoTurno;
            document.getElementById("pts-1").innerText = estado.puntos_1;
            document.getElementById("pts-2").innerText = estado.puntos_2;

            renderizarTablero(estado);

            if (
              estado.cartas_seleccionadas.length === 2 &&
              estado.turno === miJugador
            ) {
              setTimeout(() => {
                fetch("/api/verificar_memorama", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ sala: miSala }),
                }).then(() => obtenerEstadoOnline());
              }, 1500);
            }

            if (estado.puntos_1 + estado.puntos_2 === 8) {
              clearInterval(intervalo);
              let ganador =
                estado.puntos_1 > estado.puntos_2
                  ? 1
                  : estado.puntos_2 > estado.puntos_1
                    ? 2
                    : "Empate";
              if (ganador === "Empate") alert("¡Fue un empate!");
              else
                alert(
                  ganador === miJugador
                    ? "¡FELICIDADES, GANASTE! 🎉"
                    : "Perdiste... 😿",
                );
            }
          });
      }

      function voltearCartaOnline(idx, estado) {
        if (estado.turno !== miJugador) return alert("¡No es tu turno!");
        if (estado.cartas_seleccionadas.length >= 2) return;
        if (estado.visibles[idx] || estado.resueltas[idx]) return;

        fetch("/api/jugar_memorama", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sala: miSala, jugador: miJugador, idx: idx }),
        }).then(() => obtenerEstadoOnline());
      }

      // =========================================================
      // --- FUNCIÓN COMPARTIDA PARA DIBUJAR LAS CARTAS ---
      // =========================================================
      function renderizarTablero(estado) {
        const tablero = document.getElementById("tablero-online");
        tablero.innerHTML = "";

        for (let i = 0; i < 16; i++) {
          let div = document.createElement("div");
          div.className = "carta";

          if (estado.visibles[i] || estado.resueltas[i]) {
            div.classList.add("volteada");
            div.innerText = estado.cartas[i];
            if (estado.resueltas[i]) div.classList.add("encontrada");
          }

          // Decide qué función usar dependiendo del modo de juego
          div.onclick = () => {
            if (modoJuego === "bot") voltearCartaLocal(i);
            else voltearCartaOnline(i, estado);
          };

          tablero.appendChild(div);
        }
      }
    </script>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    <script>
      // Ejemplo de cómo usarlo en cualquier juego:
      // Ya no necesitas prompt, el archivo scripts.js se encarga de todo.

      function alGanarJuego(misPuntos) {
        // Solo llamas a esta función y listo
        enviarPuntaje("/guardar_tu_juego", { puntos: misPuntos });
      }
    </script>
  </body>
</html>
